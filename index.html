<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOMOS Roasting Ops</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* ── 눈 피로 최소화: 따뜻한 아이보리/라이트그레이 테마 ── */
  --bg:#f0f0eb;
  --s1:#ffffff;
  --s2:#f5f5f0;
  --s3:#eaeae5;
  --b1:#ddddd7;
  --b2:#c8c8c2;
  --t1:#2d2d2a;
  --t2:#5a5a55;
  --t3:#8f8f88;
  --gold:#9a6e2f;--gold2:#7a5220;--golddim:rgba(154,110,47,.12);
  --green:#2e7d45;--gdim:rgba(46,125,69,.1);
  --blue:#2563a8;--bdim:rgba(37,99,168,.1);
  --purple:#6d4aad;--pdim:rgba(109,74,173,.1);
  --orange:#c05c1a;--odim:rgba(192,92,26,.1);
  --red:#b53232;--rdim:rgba(181,50,50,.1);
  --yellow:#8a6c10;--ydim:rgba(138,108,16,.1);
  --cyan:#1a7a8a;--cdim:rgba(26,122,138,.1);
  --wine:#8b2020;--wdim:rgba(139,32,32,.12);
  --cat1:#2e7d45;--cat1d:rgba(46,125,69,.1);
  --cat2:#9a6e2f;--cat2d:rgba(154,110,47,.12);
  --cat3:#6d4aad;--cat3d:rgba(109,74,173,.1);
  --cat4:#2563a8;--cat4d:rgba(37,99,168,.1);
  --cat5:#c05c1a;--cat5d:rgba(192,92,26,.1);
  --r:7px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:17px}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
button,input,select,textarea{font-family:inherit;outline:none}
button{cursor:pointer;border:none}
a{color:inherit;text-decoration:none}

/* layout */
#app{display:flex;min-height:100vh}
#sb{width:224px;min-width:224px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:100;overflow-y:auto}
#main{margin-left:224px;flex:1;display:flex;flex-direction:column;min-height:100vh}
#tb{height:50px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:sticky;top:0;z-index:80;flex-shrink:0}
#ct{padding:22px;flex:1}
.page{display:none;animation:fi .15s ease}.page.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* sidebar */
.logo{padding:14px 12px 10px;border-bottom:1px solid var(--b1)}
.lm{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--gold);letter-spacing:3px}
.ls{font-size:9px;color:var(--t3);margin-top:2px;letter-spacing:.8px}
.ns{padding:7px 5px 2px}
.nl{font-size:8px;font-weight:700;color:var(--t3);letter-spacing:2px;text-transform:uppercase;padding:0 7px 5px}
.ni{display:flex;align-items:center;gap:6px;padding:8px 11px;border-radius:5px;cursor:pointer;font-size:13px;color:var(--t2);transition:all .1s;border:1px solid transparent;margin-bottom:1px}
.ni:hover{background:var(--s2);color:var(--t1)}
.ni.on{background:var(--s3);color:var(--gold);border-color:var(--b1)}
.ni-i{width:14px;text-align:center;font-size:11px;flex-shrink:0}
.ni-sub{font-size:9px;color:var(--t3);padding:2px 9px 1px 30px}
.sf{margin-top:auto;padding:8px 5px;border-top:1px solid var(--b1)}
/* cat filter */
.cf-wrap{padding:5px 5px 3px;border-top:1px solid var(--b1);margin-top:5px}
.cf-l{font-size:8px;font-weight:700;color:var(--t3);letter-spacing:2px;text-transform:uppercase;padding:0 7px 5px}
.cf{display:flex;align-items:center;gap:5px;padding:4px 7px;border-radius:4px;cursor:pointer;font-size:10px;color:var(--t3);transition:all .1s;margin-bottom:1px;user-select:none}
.cf:hover{background:var(--s2)}.cf.on{color:var(--t1)}
.cf-d{width:7px;height:7px;border-radius:2px;flex-shrink:0;transition:opacity .1s}.cf:not(.on) .cf-d{opacity:.25}
.cf-c{margin-left:auto;font-size:9px;opacity:0}.cf.on .cf-c{opacity:1}

/* topbar */
.tb-t{font-size:15px;font-weight:600;color:var(--t2)}
.uc{display:flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--b1);border-radius:20px;padding:3px 10px;font-size:11px}
.od{width:6px;height:6px;border-radius:50%;background:var(--green)}

/* kpi */
.kg{display:grid;gap:9px;margin-bottom:16px}
.kg-5{grid-template-columns:repeat(5,1fr)}.kg-4{grid-template-columns:repeat(4,1fr)}.kg-3{grid-template-columns:repeat(3,1fr)}
.kc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:11px 13px;position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kc.cg::before{background:var(--gold)}.kc.cr::before{background:var(--red)}.kc.co::before{background:var(--orange)}.kc.cb::before{background:var(--blue)}.kc.cv::before{background:var(--green)}.kc.cp::before{background:var(--purple)}
.kl{font-size:9px;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.kv{font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600}
.kc.cg .kv{color:var(--gold)}.kc.cr .kv{color:var(--red)}.kc.co .kv{color:var(--orange)}.kc.cb .kv{color:var(--blue)}.kc.cv .kv{color:var(--green)}.kc.cp .kv{color:var(--purple)}
.ks{font-size:9px;color:var(--t3);margin-top:2px}

/* calendar */
.cal{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden}
.ch{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--s2);border-bottom:1px solid var(--b1)}
.cn{display:flex;align-items:center;gap:7px}
.cm{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600}
.wd{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--b1)}
.wdi{padding:7px 0;text-align:center;font-size:8px;font-weight:700;color:var(--t3);letter-spacing:1.5px}
.cg-wrap{display:grid;grid-template-columns:repeat(7,1fr)}
.cc{min-height:94px;border-right:1px solid var(--b1);border-bottom:1px solid var(--b1);padding:4px;cursor:pointer;transition:background .08s;display:flex;flex-direction:column;gap:1px}
.cc:nth-child(7n){border-right:none}.cc:hover{background:var(--s2)}
.cc.tod{background:rgba(200,169,110,.05)}.cc.oth{opacity:.2;pointer-events:none}
.cc.sun .dn{color:var(--red)}.cc.sat .dn{color:var(--blue)}
.dn{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:1px}
.tod .dn{background:var(--gold);color:#000}
.ci{font-size:9px;border-radius:3px;padding:1px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;display:flex;align-items:center;gap:2px}
.ci.c1{background:var(--cat1d);color:var(--cat1)}.ci.c2{background:var(--cat2d);color:var(--cat2)}
.ci.c3{background:var(--cat3d);color:var(--cat3)}.ci.c4{background:var(--cat4d);color:var(--cat4)}
.ci.c5{background:var(--cat5d);color:var(--cat5)}.ci.ug{background:var(--rdim);color:var(--red)}
.ci.more{font-size:8px;color:var(--t3);background:none;padding:0 3px}

/* tables */
.tw{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden}
.ts{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--s2);padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--b1);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--b1);color:var(--t1);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--s2)}
tr.ro td{background:var(--wdim)}
tr.rr td{background:var(--rdim)}
tr.ror td{background:var(--odim)}

/* badges */
.b{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.bg{background:var(--gdim);color:var(--green)}.by{background:var(--ydim);color:var(--yellow)}
.bo{background:var(--odim);color:var(--orange)}.br{background:var(--rdim);color:var(--red)}
.bw{background:var(--wdim);color:#e57373}.bb{background:var(--bdim);color:var(--blue)}
.bp{background:var(--pdim);color:var(--purple)}.bau{background:var(--golddim);color:var(--gold)}
.bz{background:var(--s3);color:var(--t3)}.bc{background:var(--cdim);color:var(--cyan)}
.bk{background:var(--odim);color:var(--orange);border:1px solid rgba(251,146,60,.2)}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 15px;border-radius:5px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .1s;font-family:inherit}
.bp2{background:var(--gold);color:#000}.bp2:hover{background:var(--gold2);color:#fff}
.bs{background:var(--s3);color:var(--t1);border:1px solid var(--b1)}.bs:hover{background:var(--b1)}
.bg2{background:transparent;color:var(--t2);border:1px solid var(--b1)}.bg2:hover{color:var(--t1);border-color:var(--b2)}
.bd{background:var(--rdim);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.bsm{padding:5px 11px;font-size:12px}.bxs{padding:3px 8px;font-size:11px}

/* inputs */
.inp{background:var(--s2);border:1px solid var(--b1);color:var(--t1);padding:8px 12px;border-radius:5px;font-size:13px;transition:border-color .1s;width:100%}
.inp:focus{border-color:var(--gold)}.inp::placeholder{color:var(--t3)}
.lbl{font-size:11px;color:var(--t3);margin-bottom:3px;font-weight:600;letter-spacing:.3px;display:block}
.fg{margin-bottom:10px}.fg:last-child{margin-bottom:0}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.r4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}

/* overlay/drawer */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:none;backdrop-filter:blur(2px)}
.ov.on{display:flex}
.dr{background:var(--s1);height:100vh;border-left:1px solid var(--b1);overflow-y:auto;display:flex;flex-direction:column;margin-left:auto;animation:si .16s ease}
.dr-s{width:460px}.dr-m{width:540px}.dr-l{width:640px}.dr-xl{width:900px}
@keyframes si{from{transform:translateX(100%)}to{transform:none}}
.mb2{background:var(--s1);border:1px solid var(--b1);border-radius:10px;width:500px;max-height:88vh;overflow-y:auto;margin:auto;animation:fi .16s ease}
.mh{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--s2);border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:1;flex-shrink:0}
.mt{font-size:13px;font-weight:600}
.mb{padding:16px;flex:1;overflow-y:auto}
.xb{width:24px;height:24px;border-radius:4px;background:var(--s3);border:1px solid var(--b1);color:var(--t2);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.xb:hover{color:var(--t1)}

/* misc */
.dv{border:none;border-top:1px solid var(--b1);margin:11px 0}
.mn{font-family:'IBM Plex Mono',monospace}
.emp{text-align:center;padding:28px;color:var(--t3);font-size:11px}
.fb{display:flex;gap:6px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.fb .inp{width:auto}
.tabs{display:flex;border-bottom:1px solid var(--b1);margin-bottom:12px}
.tab{padding:9px 16px;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .1s}
.tab:hover{color:var(--t1)}.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:15px}
.pt{font-size:20px;font-weight:700;letter-spacing:-.3px}.ps{font-size:10px;color:var(--t3);margin-top:2px}
.pa{display:flex;gap:6px;flex-shrink:0;align-items:center}
.ss{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin:12px 0 7px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:9px 15px;margin-bottom:12px}
.ik{font-size:9px;color:var(--t3);font-weight:600;margin-bottom:2px}.iv{font-size:11px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.prog{height:3px;background:var(--b1);border-radius:2px;overflow:hidden;margin-top:5px}
.pf{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}
.csm{display:flex;gap:6px;margin-bottom:11px;flex-wrap:wrap}
.csc{background:var(--s1);border:1px solid var(--b1);border-radius:5px;padding:5px 10px;display:flex;align-items:center;gap:6px;font-size:10px}
.pf-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.pf-b{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--b1);background:var(--s2);color:var(--t3);transition:all .1s}
.pf-b.on{border-color:currentColor}

/* bulk schedule grid */
.bsg table{border-collapse:collapse;width:max-content}
.bsg th{background:var(--s2);padding:5px 2px;text-align:center;font-size:8px;font-weight:700;color:var(--t3);border-right:1px solid var(--b1);min-width:50px;border-bottom:1px solid var(--b1)}
.bsg td{padding:2px;border-right:1px solid var(--b1);border-bottom:1px solid var(--b1)}
.bsg .emp-th{position:sticky;left:0;background:var(--s2);z-index:2;white-space:nowrap;text-align:left;padding:5px 8px}

/* status colors */
.st-delay{background:var(--rdim);color:var(--red)}.st-ready{background:var(--ydim);color:var(--yellow)}.st-done{background:var(--gdim);color:var(--green)}

/* alert banner */
.alert-banner{background:rgba(251,146,60,.12);border:1px solid rgba(251,146,60,.3);border-radius:6px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--orange)}
</style>
</head>

function calcAnnualLeave(joinDateStr){
  if(!joinDateStr)return 15;
  const join=new Date(joinDateStr),now=new Date();
  const months=Math.floor((now-join)/(1000*60*60*24*30.44));
  const years=Math.floor(months/12);
  if(months<12)return months; // 매월 1일 (최대 11)
  return Math.min(25,15+Math.floor((years-1)/2));
}

// ── Supabase 기본 요청 ──
async function sbReq(method,tbl,body,query=''){
  try{
    const url=`${SB_URL}/rest/v1/${tbl}${query}`;
    const headers={
      'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,
      'Content-Type':'application/json',
    };
    if(method==='POST') headers['Prefer']='resolution=merge-duplicates,return=minimal';
    if(method==='GET')  headers['Prefer']='count=none';
    const r=await fetch(url,{method,headers,body:body?JSON.stringify(body):undefined});
    if(!r.ok){console.warn('SB',method,tbl,r.status,await r.text().catch(()=>''));return null;}
    _sbConnected=true;
    if(r.status===204||method==='DELETE'||method==='PATCH')return true;
    const text=await r.text();
    return text?JSON.parse(text):[];
  }catch(e){
    console.warn('SB network error:',e.message);
    _sbConnected=false;
    updateSyncBadge();
    return null;
  }
}

async function sbLoadAll(){
  updateSyncBadge('loading');
  try{
    // 병렬로 모든 테이블 조회
    const [emps,items,orders,prods,events,lb,lr,ot,settings]=await Promise.all([
      sbReq('GET',SB_TBL.employees),
      sbReq('GET',SB_TBL.items),
      sbReq('GET',SB_TBL.orders),
      sbReq('GET',SB_TBL.prodEntries),
      sbReq('GET',SB_TBL.calEvents),
      sbReq('GET',SB_TBL.leaveBalance),
      sbReq('GET',SB_TBL.leaveRecords),
      sbReq('GET',SB_TBL.overtime),
      sbReq('GET',SB_TBL.settings),
    ]);
    if(emps===null){_sbConnected=false;updateSyncBadge('offline');return false;}
    // 캐시에 저장
    _sbCache.employees=   (emps||[]).map(rowToEmp);
    _sbCache.items=       (items||[]).map(rowToItem);
    _sbCache.orders=(orders||[]).map(r=>{const o=rowToOrder(r);o.status=normalizeStatus(o.status);return o;});
    _sbCache.prodEntries= (prods||[]).map(rowToProd);
    _sbCache.calEvents=   (events||[]).map(rowToEvent);
    _sbCache.leaveBalance=(lb||[]).map(rowToLB);
    _sbCache.leaveRecords=(lr||[]).map(rowToLR);
    _sbCache.overtimeRecords=(ot||[]).map(rowToOT);
    // settings 테이블에서 설정값 복원
    (settings||[]).forEach(s=>{
      try{_sbCache[s.key]=JSON.parse(s.value);}catch{_sbCache[s.key]=s.value;}
    });
    // localStorage도 캐시 업데이트
    Object.keys(_sbCache).forEach(k=>sv(k,_sbCache[k]));
    _sbConnected=true;
    updateSyncBadge('ok');
    return true;
  }catch(e){
    console.error('sbLoadAll error:',e);
    _sbConnected=false;
    updateSyncBadge('offline');
    return false;
  }
}

async function sbSaveRows(tblKey,rows){
  if(!rows||!rows.length)return;
  // 배치 크기 제한 (한번에 최대 100건)
  const BATCH=100;
  for(let i=0;i<rows.length;i+=BATCH){
    const batch=rows.slice(i,i+BATCH);
    await sbReq('POST',SB_TBL[tblKey],batch);
  }
}

// ── 디바운스 저장 ──
function debounce(key,fn,ms=600){
  clearTimeout(_pending[key]);
  _pending[key]=setTimeout(fn,ms);
}

// ── gd/sd: 캐시 우선, 오프라인 폴백 ──
function gd(k){
  if(k in _sbCache)return _sbCache[k];
  const lv=ld(k);if(lv!==null){
    // orders 로드 시 status 정규화 (localStorage에 영문 상태가 남아있을 수 있음)
    if(k==='orders'&&Array.isArray(lv))return lv.map(o=>({...o,status:(['Completed','Shipped'].includes(o.status)?'생산완료':['In Production','Partially Completed'].includes(o.status)?'생산중':['생산완료','생산중','생산대기'].includes(o.status)?o.status:'생산대기')}));
    return lv;
  }
  if(k in DEFS)return JSON.parse(JSON.stringify(DEFS[k]));
  return null;
}
function sd(k,v){
  _sbCache[k]=v;
  sv(k,v);
}

// ── 발주 고유코드 자동 생성 ──
const ORDER_CAT_PREFIX={
  '코스트코':'CC','드립백':'DRIP','캡슐':'CAP',
  '인스턴트':'POWDER','커피티백':'TBAG','콜드브루':'COLD','기타':'ORD'
};
function genOrderCode(category){
  const prefix=ORDER_CAT_PREFIX[category]||'ORD';
  // 해당 카테고리의 기존 발주 중 같은 prefix 코드 최대값 추출
  const existing=DB.orders
    .map(o=>o.orderCode||'')
    .filter(c=>c.startsWith(prefix+'-'))
    .map(c=>parseInt(c.replace(prefix+'-',''))||0);
  const maxNum=existing.length?Math.max(...existing):0;
  return prefix+'-'+String(maxNum+1).padStart(2,'0');
}

function nid(){
  let n=(gd('nextId'))||DEFS.nextId;
  const next=n+1;
  _sbCache.nextId=next;sv('nextId',next);
  debounce('nextId',()=>sbSaveSetting('nextId',next),1000);
  return n;
}

// ── UTILS ──
const h=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const b=(c,t)=>`<span class="b ${c}">${t}</span>`;
const fKg=n=>n==null?'-':Number(n).toLocaleString('ko-KR')+'kg';
const fD=s=>s?s.slice(2).replace(/-/g,'/'):'-';
const fRoast=o=>{const s=o.roastingDateStart,e=o.roastingDateEnd;if(!s)return'-';if(!e||s===e)return fD(s);return`${fD(s)}~${fD(e)}`};
const rem=o=>Math.max(0,(o.requestedKg||0)-(o.completedKg||0));
const remReal=o=>(o.requestedKg||0)-(o.completedKg||0); // 음수 허용 (초과 생산 표시용)
const fKgSigned=n=>{
  if(n==null)return'-';
  const abs=Math.abs(n);
  const s=abs.toLocaleString('ko-KR')+'kg';
  return n<0?'-'+s:s;
};
const pct=o=>o.requestedKg>0?Math.min(100,Math.round(o.completedKg/o.requestedKg*100)):0;
const empMap=()=>{const m={};DB.employees.forEach(e=>m[e.id]=e);return m};
function dU(d){if(!d)return null;const t=new Date(d);t.setHours(0,0,0,0);const n=new Date();n.setHours(0,0,0,0);return Math.floor((t-n)/86400000)}
function urgO(o){const d=o.roastingDateEnd||o.roastingDateStart;if(!d||o.status==='생산완료')return'done';const v=dU(d);if(v<0)return'ov';if(v<=1)return'r';if(v<=2)return'o';return'n'}
// ── 생산 상태 자동 계산 (생산예정/생산중/생산완료) ──
function calcOrderStatus(completedKg, requestedKg){
  if(completedKg>=requestedKg&&requestedKg>0) return '생산완료';
  if(completedKg>0) return '생산중';
  return '생산대기';
}
// 기존 영문 상태값 → 한글 3단계 변환
function normalizeStatus(s){
  if(!s)return '생산대기';
  if(s==='생산완료')return '생산완료';
  if(s==='생산중')return '생산중';
  if(s==='생산대기')return '생산대기';
  if(['Completed','Shipped'].includes(s))return '생산완료';
  if(['In Production','Partially Completed'].includes(s))return '생산중';
  return '생산대기';
}

function urgTr(o){
  if(o.status==='생산완료')return '';
  const d=o.roastingDateEnd||o.roastingDateStart;
  if(!d)return '';
  const v=dU(d);
  if(v===0)return 'rr';   // D-0: 오늘 마감 → 옅은 빨간
  if(v<0)return 'ror';    // D+1이상 초과 → 옅은 주황
  return '';               // 나머지 흰색
}

// ── ARCHIVE ALERT ──
function checkArchiveAlert(){
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  if(DB.lastArchiveAlert===ym)return;
  const twoMonthsAgo=new Date(now.getFullYear(),now.getMonth()-2,1);
  const old=DB.orders.filter(o=>o.status==='생산완료').filter(o=>{
    const d=new Date(o.shippingDate||o.orderDate);
    return d<twoMonthsAgo;
  });
  if(old.length>0){
    DB.lastArchiveAlert=ym;
    return old.length;
  }
  return 0;
}

}
function cellItems(d){
  const evs=getEvsByDate(d);
  const em=empMap(), rows=[];
  evs.filter(e=>e.cat===1).forEach(e=>rows.push({cls:'c1',label:`${e.startTime?e.startTime+' ':''}${em[e.empId]?.name||e.title}`}));
  evs.filter(e=>e.cat===2).forEach(e=>rows.push({cls:'c2',label:e.title}));
  if(activeCats[2])DB.orders.filter(o=>{if(o.status==='생산완료')return false;const s=o.roastingDateStart,en=o.roastingDateEnd||s;return s&&d>=s&&d<=en&&urgO(o)==='ov'}).forEach(o=>rows.push({cls:'ug',label:`⚠ ${o.category}`}));
  evs.filter(e=>e.cat===3).forEach(e=>rows.push({cls:'c3',label:e.title}));

  evs.filter(e=>e.cat===5).forEach(e=>rows.push({cls:'c5',label:`${em[e.empId]?.name||''} ${e.title}`}));

}

function renderCalGrid(){
  const lbl=document.getElementById('cal-mo');if(lbl)lbl.textContent=`${calY}.${String(calM).padStart(2,'0')}`;
  const grid=document.getElementById('cgrid');if(!grid)return;
  const first=new Date(calY,calM-1,1),last=new Date(calY,calM,0);
  const fdow=first.getDay(),ld=last.getDate();
  const cells=[];
  for(let i=0;i<fdow;i++){const d=new Date(calY,calM-1,-fdow+1+i);cells.push({d:d.toISOString().split('T')[0],o:true,dow:d.getDay()})}
  for(let i=1;i<=ld;i++){const dt=new Date(calY,calM-1,i);cells.push({d:dt.toISOString().split('T')[0],o:false,dow:dt.getDay()})}
  const fill=42-cells.length;
  for(let i=1;i<=fill;i++){const dt=new Date(calY,calM,i);cells.push({d:dt.toISOString().split('T')[0],o:true,dow:dt.getDay()})}
  grid.innerHTML=cells.map(cell=>{
    const isT=cell.d===TODAY;
    const cls=['cc',isT?'tod':'',cell.o?'oth':'',cell.dow===0?'sun':cell.dow===6?'sat':''].filter(Boolean).join(' ');
    const dn=parseInt(cell.d.split('-')[2]);
    let items='';
    if(!cell.o){const{vis,extra}=cellItems(cell.d);items=vis.map(it=>`<div class="ci ${it.cls}">${h(it.label.slice(0,20))}</div>`).join('');if(extra>0)items+=`<div class="ci more">+${extra}</div>`}
    return`<div class="${cls}" data-d="${cell.d}" data-o="${cell.o?1:0}" onclick="if(!this.dataset.o*1)openDayPanel(this.dataset.d)">
      <div class="dn">${dn}</div>${items}
    </div>`;
  }).join('');
}

function openDashDayPanel(date){
  const dt=new Date(date+'T00:00:00');
  const dowKr=['일','월','화','수','목','금','토'][dt.getDay()];
  const orders=DB.orders;
  // 이날 로스팅 중인 발주
  const roasting=orders.filter(o=>{
    if(!o.roastingDateStart)return false;
    const s=o.roastingDateStart,e=o.roastingDateEnd||s;
    return date>=s&&date<=e;
  });
  // 이날 출고 발주 - 드립백/커피티백 제외
  const SHIP_SHOW=['캡슐','콜드브루','코스트코','인스턴트'];

  // 이날 캘린더 이벤트
  const events=DB.calEvents.filter(e=>e.dateStart<=date&&date<=e.dateEnd&&e.cat!==1);

  const roastRows=roasting.map(o=>{
    const r=rem(o), p=pct(o);
    const statusCls=ORDER_STATUS_CLS[o.status]||'bz';
    const isOver=o.completedKg>o.requestedKg;
    return`<div onclick="openOrderDetail(${o.id})" style="background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.2);border-radius:8px;margin-bottom:8px;cursor:pointer;overflow:hidden" onmouseover="this.style.background='rgba(74,222,128,.12)'" onmouseout="this.style.background='rgba(74,222,128,.06)'">

            <span style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h(o.itemName)}</span>
          </div>
          <div style="display:flex;gap:5px;flex-wrap:wrap">
            <span class="b ${getCatColor(o.category)}" style="font-size:10px">${o.category}</span>
            <span class="b ${statusCls}" style="font-size:10px">${o.status}</span>
            ${o.roastingDateStart!==o.roastingDateEnd&&o.roastingDateEnd?`<span style="font-size:10px;color:var(--t3)">~${fD(o.roastingDateEnd)}까지</span>`:''}
          </div>
        </div>
        <span style="font-size:11px;color:var(--t3);flex-shrink:0">→</span>
      </div>
      <!-- 수량 현황 -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border-top:1px solid rgba(74,222,128,.2);text-align:center">
        <div style="padding:7px 4px;border-right:1px solid rgba(74,222,128,.15)">
          <div class="mn" style="font-size:14px;font-weight:700">${fKg(o.requestedKg)}</div>
          <div style="font-size:9px;color:var(--t3);margin-top:1px">발주량</div>
        </div>
        <div style="padding:7px 4px;border-right:1px solid rgba(74,222,128,.15)">
          <div class="mn" style="font-size:14px;font-weight:700;color:var(--green)">${fKg(o.completedKg)}</div>
          <div style="font-size:9px;color:var(--t3);margin-top:1px">완료량</div>
        </div>
        <div style="padding:7px 4px">
          <div class="mn" style="font-size:14px;font-weight:700;color:${r>0?'var(--orange)':isOver?'var(--red)':'var(--green)'}">
            ${r>0?fKg(r):isOver?`<span title="초과">-${fKg(o.completedKg-o.requestedKg)}</span>`:'완료'}
          </div>
          <div style="font-size:9px;color:var(--t3);margin-top:1px">${r>0?'잔여량':isOver?'초과량':'잔여량'}</div>
        </div>
      </div>
      <!-- 진행률 바 -->
      <div style="height:3px;background:rgba(74,222,128,.15)">
        <div style="height:100%;background:${p>=100?'var(--green)':'var(--gold)'};width:${Math.min(p,100)}%;transition:width .3s"></div>
      </div>
    </div>`;
  }).join('');

  const shipRows=shipping.map(o=>{
    const r=rem(o),p=pct(o);
    const shtIcon=o.shippingType==='화물'?'🚛':o.shippingType==='택배'?'📦':'🚚';
    return`<div onclick="openOrderDetail(${o.id})" style="background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.2);border-radius:8px;margin-bottom:8px;cursor:pointer;overflow:hidden" onmouseover="this.style.background='rgba(96,165,250,.12)'" onmouseout="this.style.background='rgba(96,165,250,.06)'">
      <div style="display:flex;align-items:center;gap:8px;padding:10px 12px 6px">
        <div style="width:28px;height:28px;border-radius:5px;background:rgba(96,165,250,.15);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${shtIcon}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
            <span class="mn" style="font-size:11px;font-weight:800;color:var(--gold)">${o.orderCode||''}</span>
            <span style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h(o.itemName)}</span>
          </div>
          <div style="display:flex;gap:5px;flex-wrap:wrap">
            <span class="b ${getCatColor(o.category)}" style="font-size:10px">${o.category}</span>
            <span class="b ${ORDER_STATUS_CLS[o.status]||'bz'}" style="font-size:10px">${o.status}</span>
            ${o.destination?`<span style="font-size:10px;color:var(--t3)">→ ${h(o.destination)}</span>`:''}
            ${o.shippingType?`<span style="font-size:10px;color:${o.shippingType==='화물'?'var(--orange)':'var(--blue)'};font-weight:600">${shtIcon} ${o.shippingType}</span>`:''}
          </div>
        </div>
        <span style="font-size:11px;color:var(--t3);flex-shrink:0">→</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border-top:1px solid rgba(96,165,250,.2);text-align:center">
        <div style="padding:7px 4px;border-right:1px solid rgba(96,165,250,.15)">
          <div class="mn" style="font-size:14px;font-weight:700">${fKg(o.requestedKg)}</div>
          <div style="font-size:9px;color:var(--t3);margin-top:1px">발주량</div>
        </div>
        <div style="padding:7px 4px;border-right:1px solid rgba(96,165,250,.15)">
          <div class="mn" style="font-size:14px;font-weight:700;color:var(--green)">${fKg(o.completedKg)}</div>
          <div style="font-size:9px;color:var(--t3);margin-top:1px">완료량</div>
        </div>
        <div style="padding:7px 4px">
          <div class="mn" style="font-size:14px;font-weight:700;color:${r>0?'var(--orange)':'var(--green)'}">${r>0?fKg(r):'완료'}</div>
          <div style="font-size:9px;color:var(--t3);margin-top:1px">잔여량</div>
        </div>
      </div>
      <div style="height:3px;background:rgba(96,165,250,.15)">
        <div style="height:100%;background:${p>=100?'var(--blue)':'var(--blue)'};width:${Math.min(p,100)}%;opacity:0.6;transition:width .3s"></div>
      </div>
    </div>`;
  }).join('');

  const eventRows=events.map(ev=>{
    const cv=CAT[ev.cat]||{c:'var(--t3)',n:'기타'};
    const emp=em[ev.empId];
    return`<div style="display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--s2);border:1px solid var(--b1);border-radius:6px;margin-bottom:6px">
      <div style="width:8px;height:8px;border-radius:2px;background:${cv.c};flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;font-weight:600">${h(ev.title)}</div>
        <div style="font-size:9px;color:var(--t3);margin-top:1px">${cv.n}${emp?' · '+emp.name:''}${ev.startTime?' · '+ev.startTime:''}</div>
      </div>
    </div>`;
  }).join('');

  const isEmpty=!roasting.length&&!shipping.length&&!events.length;

  // 당일 로스팅 총 발주량/완료량/잔여량 집계
  const dayTotalReq=roasting.reduce((s,o)=>s+o.requestedKg,0);
  const dayTotalComp=roasting.reduce((s,o)=>s+o.completedKg,0);
  const dayTotalRem=roasting.reduce((s,o)=>s+rem(o),0);

  openOv(`<div class="dr dr-s"><div class="mh">
    <div>
      <div class="mt">${date.slice(5).replace('-','/')} (${dowKr})</div>
      <div style="font-size:10px;color:var(--t3);margin-top:2px">로스팅 ${roasting.length}건 · 출고 ${shipping.length}건</div>

  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--b1);background:var(--s2);text-align:center">
    <div style="padding:10px 4px;border-right:1px solid var(--b1)">
      <div class="mn" style="font-size:15px;font-weight:700">${fKg(dayTotalReq)}</div>
      <div style="font-size:9px;color:var(--t3);margin-top:2px">총 발주량</div>
    </div>
    <div style="padding:10px 4px;border-right:1px solid var(--b1)">
      <div class="mn" style="font-size:15px;font-weight:700;color:var(--green)">${fKg(dayTotalComp)}</div>
      <div style="font-size:9px;color:var(--t3);margin-top:2px">총 완료량</div>
    </div>
    <div style="padding:10px 4px">
      <div class="mn" style="font-size:15px;font-weight:700;color:${dayTotalRem>0?'var(--orange)':'var(--green)'}">${dayTotalRem>0?fKg(dayTotalRem):'전량완료'}</div>
      <div style="font-size:9px;color:var(--t3);margin-top:2px">총 잔여량</div>
    </div>
  </div>`:''}
  <div class="mb">

    ${shipping.length?`<div class="ss">🚚 출고 (${shipping.length}건)</div>${shipRows}`:''}
    ${events.length?`<div class="ss">📅 일정</div>${eventRows}`:''}
    ${isEmpty?`<div class="emp">이 날짜에 등록된 생산/출고 일정이 없습니다<br><button class="btn bp2 bsm" style="margin-top:10px" onclick="openAddOrder()">+ 발주 등록</button></div>`:''}
  </div></div>`);
}

// PRODUCTION DASHBOARD
// ═══════════════════════════════════════════════════
function renderDash(el){
  const orders=DB.orders;
  const active=orders.filter(o=>o.status!=='생산완료');
  const ov=active.filter(o=>urgO(o)==='ov').length;
  const inProd=active.filter(o=>o.status==='생산중').length;
  const totalRemKg=active.reduce((s,o)=>s+rem(o),0);
  const bulkA=active.filter(o=>o.bulk).length;
  const SHIP_CATS=['캡슐','콜드브루','코스트코','인스턴트'];
  const shipSoon=orders.filter(o=>{const d=dU(o.shippingDate);return d!=null&&d>=0&&d<=3&&o.status!=='생산완료'&&SHIP_CATS.includes(o.category)}).length;

  // 날짜별 발주 맵 (로스팅 기간)
  // 전역 dashY2, dashM2 사용 (월 이동 가능)
  const mStr=`${dashY2}-${String(dashM2).padStart(2,'0')}`;
  const first=new Date(dashY2,dashM2-1,1), lastDate=new Date(dashY2,dashM2,0).getDate(), firstDow=first.getDay();

  // 날짜별 발주 집계 (로스팅기간 + 출고일)
  const byDate={};
  orders.filter(o=>o.status!=='취소').forEach(o=>{
    // 로스팅 기간 표시
    if(o.roastingDateStart){
      let d=new Date(o.roastingDateStart);
      const end=new Date(o.roastingDateEnd||o.roastingDateStart);
      while(d<=end){
        const ds=d.toISOString().split('T')[0];
        if(ds.startsWith(mStr)){
          if(!byDate[ds])byDate[ds]={roasting:[],shipping:[]};
          byDate[ds].roasting.push(o);
        }
        d.setDate(d.getDate()+1);
      }
    }
    // 출고일 표시 - 드립백/커피티백 제외 (캡슐/콜드브루/코스트코 등만 표시)
    const SHIP_SHOW_CATS=['캡슐','콜드브루','코스트코','인스턴트'];
    if(o.shippingDate&&o.shippingDate.startsWith(mStr)&&SHIP_SHOW_CATS.includes(o.category)){
      if(!byDate[o.shippingDate])byDate[o.shippingDate]={roasting:[],shipping:[]};
      byDate[o.shippingDate].shipping.push(o);
    }
  });

  // 캘린더 셀 생성
  const dow=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  let cells='';
  for(let i=0;i<firstDow;i++) cells+=`<div style="min-height:80px;border-right:1px solid var(--b1);border-bottom:1px solid var(--b1)"></div>`;
  for(let d=1;d<=lastDate;d++){
    const dt=new Date(dashY2,dashM2-1,d), dowI=dt.getDay();
    const ds=`${mStr}-${String(d).padStart(2,'0')}`;
    const isT=ds===TODAY, isSun=dowI===0, isSat=dowI===6;
    const dayData=byDate[ds]||{roasting:[],shipping:[]};
    const visRoast=dashShowRoast?dayData.roasting:[];
    const visShip=dashShowShip?dayData.shipping:[];
    const roastBadges=visRoast.slice(0,3).map(o=>`
      <div onclick="openOrderDetail(${o.id})" style="display:flex;align-items:center;gap:2px;background:rgba(74,222,128,.1);border-left:2px solid var(--green);border-radius:2px;padding:1px 4px;margin-bottom:2px;cursor:pointer" title="${h(o.itemName)} | 잔여 ${fKg(rem(o))}">
        <span style="font-size:8px;color:var(--green);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60px">${h(o.itemName.slice(0,9))}</span>
        <span style="font-size:7px;color:var(--t3);margin-left:auto;flex-shrink:0">${fKg(rem(o)).replace('kg','')}</span>
      </div>`).join('');
    const shipBadges=visShip.slice(0,3).map(o=>`
      <div onclick="openOrderDetail(${o.id})" style="display:flex;align-items:center;gap:2px;background:rgba(96,165,250,.1);border-left:2px solid var(--blue);border-radius:2px;padding:1px 4px;margin-bottom:2px;cursor:pointer" title="${h(o.itemName)} → ${h(o.destination)}">
        <span style="font-size:7px;color:var(--blue);font-weight:700;flex-shrink:0">출</span>
        <span style="font-size:8px;color:var(--blue);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:52px">${h(o.itemName.slice(0,8))}</span>
      </div>`).join('');
    const extra=(visRoast.length+visShip.length)-6;
    cells+=`<div data-date="${ds}" onclick="openDashDayPanel('${ds}')" style="min-height:80px;border-right:1px solid var(--b1);border-bottom:1px solid var(--b1);padding:4px;cursor:pointer;transition:background .1s;${isT?'background:rgba(154,110,47,.07)':''}" onmouseover="this.style.background='var(--s2)'" onmouseout="this.style.background='${isT?'rgba(154,110,47,.07)':''}'">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:2px;${isT?'background:var(--gold);color:#000':isSun?'color:var(--red)':isSat?'color:var(--blue)':'color:var(--t2)'}">${d}</div>
      ${roastBadges}${shipBadges}
      ${extra>0?`<div style="font-size:7px;color:var(--t3)">+${extra}건</div>`:''}
    </div>`;
  }
  const fill=42-(firstDow+lastDate);
  for(let i=0;i<(fill<0?fill+7:fill<7?fill:0);i++) cells+=`<div style="min-height:80px;border-right:1px solid var(--b1);border-bottom:1px solid var(--b1)"></div>`;

  // 카테고리별 진행 현황
  const byCat={};
  active.forEach(o=>{if(!byCat[o.category])byCat[o.category]={req:0,comp:0,rem:0,count:0};byCat[o.category].req+=o.requestedKg;byCat[o.category].comp+=o.completedKg;byCat[o.category].rem+=rem(o);byCat[o.category].count++});
  const catCards=Object.entries(byCat).map(([cat,v])=>`
    <div style="background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:11px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
        ${b(getCatColor(cat),cat)}<span class="mn" style="font-size:10px;color:var(--t3)">${v.count}건</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:7px;text-align:center">
        <div><div class="mn" style="font-size:12px;font-weight:700">${fKg(v.req)}</div><div style="font-size:8px;color:var(--t3)">요청</div></div>
        <div><div class="mn" style="font-size:12px;font-weight:700;color:var(--green)">${fKg(v.comp)}</div><div style="font-size:8px;color:var(--t3)">완료</div></div>
        <div><div class="mn" style="font-size:12px;font-weight:700;color:var(--orange)">${fKg(v.rem)}</div><div style="font-size:8px;color:var(--t3)">잔여</div></div>
      </div>
      <div class="prog"><div class="pf" style="width:${v.req>0?Math.round(v.comp/v.req*100):0}%"></div></div>
    </div>`).join('');

  // 긴급 발주
  const urgOrders=active.filter(o=>urgO(o)!=='n'&&urgO(o)!=='done').sort((a,b)=>{const m={ov:0,r:1,o:2};return(m[urgO(a)]||3)-(m[urgO(b)]||3)});
  const urgRows=urgOrders.slice(0,6).map(o=>{
    const[ub,ul]=urgBadge(o);
    return`<tr class="${urgTr(o)}" onclick="openOrderDetail(${o.id})" style="cursor:pointer">
      <td>${b(ub,ul)}</td>
      <td>${b(getCatColor(o.category),o.category)}</td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${h(o.itemName)}</td>
      <td class="mn" style="font-size:10px">${fRoast(o)}</td>
      <td class="mn" style="font-size:10px;color:var(--t3)">${fD(o.shippingDate)}</td>
      <td class="mn" style="color:var(--orange)">${fKg(rem(o))}</td>
      <td>${b(ORDER_STATUS_CLS[o.status]||'bz',o.status)}</td>
      <td onclick="event.stopPropagation()"><button class="btn bg2 bxs" onclick="openProdEntry(${o.id})">생산입력</button></td>
    </tr>`;
  }).join('');

  el.innerHTML=`
  <div class="ph">
    <div><div class="pt">생산 대시보드</div><div class="ps">생산 일정 · 진행중인 발주 현황</div></div>
    <div class="pa">
      <button class="btn bp2" onclick="openAddOrder()">+ 발주 등록</button>
      <button class="btn bs bsm" onclick="go('orders')">발주 목록 →</button>
    </div>
  </div>

  <!-- KPI 카드 -->
  <div class="kg kg-5" style="margin-bottom:16px">
    <div class="kc cr"><div class="kl">기한초과</div><div class="kv">${ov}</div><div class="ks">즉시 처리</div></div>
    <div class="kc co"><div class="kl">생산중</div><div class="kv">${inProd}</div><div class="ks">생산중</div></div>
    <div class="kc cg"><div class="kl">총 잔여량</div><div class="kv">${fKg(totalRemKg)}</div><div class="ks">전체 미완료</div></div>
    <div class="kc cb"><div class="kl">벌크 진행</div><div class="kv">${bulkA}</div><div class="ks">1000kg+</div></div>
    <div class="kc cp"><div class="kl">3일내 출고</div><div class="kv">${shipSoon}</div><div class="ks">건</div></div>
  </div>

  <!-- 생산 캘린더 -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">
    <div style="display:flex;align-items:center;gap:6px">
      <button class="btn bs bsm" onclick="dashM2--;if(dashM2<1){dashM2=12;dashY2--;}renderDash(document.getElementById('page-dash'))">‹</button>
      <span class="mn" style="font-size:13px;font-weight:700;min-width:60px;text-align:center">${dashY2}.${String(dashM2).padStart(2,'0')}</span>
      <button class="btn bs bsm" onclick="dashM2++;if(dashM2>12){dashM2=1;dashY2++;}renderDash(document.getElementById('page-dash'))">›</button>
      <button class="btn bs bsm" onclick="dashY2=new Date().getFullYear();dashM2=new Date().getMonth()+1;renderDash(document.getElementById('page-dash'))">오늘</button>
    </div>
    <div style="display:flex;align-items:center;gap:5px">
      <button onclick="dashShowRoast=!dashShowRoast;renderDash(document.getElementById('page-dash'))"

// ORDERS
// ═══════════════════════════════════════════════════
function renderOrders(el){
  const orders=DB.orders;
  const catSum={};
  orders.filter(o=>o.status!=='생산완료').forEach(o=>{catSum[o.category]=(catSum[o.category]||0)+rem(o)});
  const catChips=Object.entries(catSum).map(([cat,kg])=>`<div class="csc">${b(getCatColor(cat),cat)}<span class="mn" style="font-size:11px;font-weight:600;color:var(--gold)">${fKg(kg)}</span><span style="font-size:9px;color:var(--t3)">잔여</span></div>`).join('');

  let filtered=orders.filter(o=>{
    // 발주 목록/생산 현황 탭: 생산완료 자동 제외 (생산완료 탭에서만 표시)
    if(oTab!=='done'&&o.status==='생산완료')return false;
    if(oFCat&&o.category!==oFCat)return false;
    if(oFSt&&o.status!==oFSt)return false;
    if(oSrch&&!o.itemName.includes(oSrch)&&!(o.itemCode||'').includes(oSrch)&&!(o.destination||'').includes(oSrch))return false;
    // 날짜 범위 필터 (로스팅은 roastingDateStart~roastingDateEnd 범위 포함)
    if(oDateField==='roasting'){
      const rs=o.roastingDateStart||'', re=o.roastingDateEnd||rs;
      if(oDateFrom&&re&&re<oDateFrom)return false;  // 로스팅 끝이 시작일보다 이전
      if(oDateTo&&rs&&rs>oDateTo)return false;      // 로스팅 시작이 종료일보다 이후
    } else {
      const dateVal=oDateField==='shipping'?(o.shippingDate||''):(o.orderDate||'');
      if(oDateFrom&&dateVal&&dateVal<oDateFrom)return false;
      if(oDateTo&&dateVal&&dateVal>oDateTo)return false;
    }
    return true;
  }).sort((a,b)=>{
    let cmp=0;
    if(oSort==='rd') cmp=(a.roastingDateStart||'').localeCompare(b.roastingDateStart||'');
    else if(oSort==='sd') cmp=(a.shippingDate||'').localeCompare(b.shippingDate||'');
    else if(oSort==='od') cmp=(a.orderDate||'').localeCompare(b.orderDate||'');
    else if(oSort==='kg') cmp=a.requestedKg-b.requestedKg;
    else if(oSort==='ug'){const m={ov:0,r:1,o:2,n:3,done:4};cmp=(m[urgO(a)]||3)-(m[urgO(b)]||3);}
    else if(oSort==='cat') cmp=(a.category||'').localeCompare(b.category||'');
    else if(oSort==='item') cmp=(a.itemName||'').localeCompare(b.itemName||'');
    else if(oSort==='rem') cmp=rem(a)-rem(b);
    return oSortDir==='desc'?-cmp:cmp;
  });

  const listRows=filtered.map(o=>{
    const r=rem(o),p=pct(o),tc=urgTr(o);
    const pd=o.roastingDateEnd&&o.roastingDateEnd!==o.roastingDateStart?`${fD(o.roastingDateStart)}<span style="color:var(--t3)">~${fD(o.roastingDateEnd)}</span>`:fD(o.roastingDateStart);
    return`<tr class="${tc}" onclick="openOrderDetail(${o.id})" style="cursor:pointer">
      <td><div style="display:flex;align-items:center;gap:3px"><div style="width:5px;height:5px;border-radius:50%;background:${urgDot(o)}"></div>${o.bulk?b('bk','B'):''}</div></td>
      <td class="mn" style="font-size:11px;font-weight:700;color:var(--gold);white-space:nowrap">${o.orderCode||'-'}</td>
      <td class="mn" style="font-size:9px;color:var(--t3)">${fD(o.orderDate)}</td>
      <td class="mn" style="font-size:9px">${pd}</td>
      <td class="mn" style="font-size:9px;color:var(--t3)">${fD(o.shippingDate)}</td>
      <td>${b(getCatColor(o.category),o.category)}</td>
      <td class="mn" style="font-size:9px;color:var(--t3)">${o.itemCode||'-'}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${h(o.itemName)}</td>
      <td class="mn" style="font-weight:600">${fKg(o.requestedKg)}</td>
      <td class="mn" style="color:var(--green)">${fKg(o.completedKg)}</td>
      <td class="mn" style="color:${r>0?'var(--orange)':'var(--t3)'}">${fKg(r)}</td>
      <td><div style="display:flex;align-items:center;gap:3px"><div style="width:40px;height:2px;background:var(--b1);border-radius:2px;overflow:hidden"><div style="height:100%;background:var(--gold);width:${p}%"></div></div><span class="mn" style="font-size:9px;color:var(--t3)">${p}%</span></div></td>
      <td>${b(ORDER_STATUS_CLS[o.status]||'bz',o.status)}</td>
      <td style="font-size:9px;color:var(--t3);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h(o.note||'')}</td>
      <td onclick="event.stopPropagation()">
        <div style="display:flex;gap:3px">
          ${o.status!=='생산완료'?`<button class="btn bg2 bxs" onclick="openProdEntry(${o.id})">생산입력</button>`:''}
          <button class="btn bd bxs" onclick="event.stopPropagation();deleteOrder(${o.id})">삭제</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML=`
  <div class="ph"><div><div class="pt">발주/생산 관리</div><div class="ps">로스팅 요청 및 생산 진행 현황</div></div>
  <div class="pa" style="gap:5px">
    <button class="btn bs bsm" onclick="downloadOrderTemplate()">↓ 발주 양식</button>
    <label style="display:inline-flex;align-items:center;gap:3px;padding:5px 10px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;background:var(--s2);color:var(--t2);border:1px solid var(--b1);font-family:inherit" title="엑셀 업로드">
      📥 엑셀 업로드<input type="file" accept=".xlsx,.xls" style="display:none;position:absolute;width:0;height:0;opacity:0" onchange="uploadOrdersXL(this)">
    </label>
    <button class="btn bp2" onclick="openAddOrder()">+ 발주 등록</button>
  </div></div>
  <div class="csm">${catChips}</div>
  <div class="tabs">
    <div class="tab ${oTab==='list'?'on':''}" onclick="oTab='list';if(oFSt==='생산완료')oFSt='';renderOrders(document.getElementById('page-orders'))">발주 목록</div>
    <div class="tab ${oTab==='prod'?'on':''}" onclick="oTab='prod';if(oFSt==='생산완료')oFSt='';renderOrders(document.getElementById('page-orders'))">생산 현황</div>
    <div class="tab ${oTab==='done'?'on':''}" onclick="oTab='done';oFSt='생산완료';renderOrders(document.getElementById('page-orders'))" style="${oTab==='done'?'':''}">
      생산완료
      <span style="margin-left:4px;background:var(--gdim);color:var(--green);border-radius:10px;padding:0px 5px;font-size:10px;font-weight:700">${orders.filter(o=>o.status==='생산완료').length}</span>
    </div>
  </div>
  <!-- 검색/필터 바 -->
  <div class="fb" style="flex-wrap:wrap;gap:6px;margin-bottom:6px">
    <input class="inp" style="width:140px" placeholder="품목명/코드/배송지" value="${h(oSrch)}" oninput="oSrch=this.value;renderOrders(document.getElementById('page-orders'))">
    <select class="inp" style="width:auto" onchange="oFCat=this.value;renderOrders(document.getElementById('page-orders'))">
      <option value="">전체 카테고리</option>
      ${DB.categories.map(c=>`<option ${oFCat===c?'selected':''}>${c}</option>`).join('')}
    </select>
    <select class="inp" style="width:auto" onchange="oFSt=this.value;renderOrders(document.getElementById('page-orders'))">
      <option value="">전체 상태</option>
      ${ALL_ORDER_STATUSES.map(s=>`<option value="${s}" ${oFSt===s?'selected':''}>${s}</option>`).join('')}
    </select>
  </div>
  <!-- 날짜 범위 + 정렬 바 -->
  <div class="fb" style="flex-wrap:wrap;gap:6px;margin-bottom:8px;align-items:center">
    <select class="inp" style="width:auto" onchange="oDateField=this.value;renderOrders(document.getElementById('page-orders'))">
      <option value="roasting" ${oDateField==='roasting'?'selected':''}>로스팅일</option>
      <option value="shipping" ${oDateField==='shipping'?'selected':''}>출고요청일</option>
      <option value="order"    ${oDateField==='order'?'selected':''}>발주일</option>
    </select>
    <input class="inp" type="date" style="width:130px" value="${oDateFrom}" onchange="oDateFrom=this.value;renderOrders(document.getElementById('page-orders'))" title="시작일">
    <span style="font-size:11px;color:var(--t3)">~</span>
    <input class="inp" type="date" style="width:130px" value="${oDateTo}" onchange="oDateTo=this.value;renderOrders(document.getElementById('page-orders'))" title="종료일">
    <button class="btn bs bsm" onclick="oDateFrom='';oDateTo='';renderOrders(document.getElementById('page-orders'))" title="날짜 초기화">✕</button>
    <div style="flex:1"></div>
    <span style="font-size:10px;color:var(--t3)">정렬:</span>
    <select class="inp" style="width:auto" onchange="oSort=this.value;renderOrders(document.getElementById('page-orders'))">
      <option value="rd"   ${oSort==='rd'?'selected':''}>로스팅일</option>
      <option value="sd"   ${oSort==='sd'?'selected':''}>출고요청일</option>
      <option value="od"   ${oSort==='od'?'selected':''}>발주일</option>
      <option value="cat"  ${oSort==='cat'?'selected':''}>카테고리</option>
      <option value="item" ${oSort==='item'?'selected':''}>품목명</option>
      <option value="kg"   ${oSort==='kg'?'selected':''}>요청량</option>
      <option value="rem"  ${oSort==='rem'?'selected':''}>잔여량</option>
      <option value="ug"   ${oSort==='ug'?'selected':''}>긴급도</option>
    </select>
    <button class="btn bs bsm" onclick="oSortDir=oSortDir==='asc'?'desc':'asc';renderOrders(document.getElementById('page-orders'))" style="min-width:32px;font-family:monospace">
      ${oSortDir==='asc'?'↑ 오름':'↓ 내림'}
    </button>
    <span style="font-size:10px;color:var(--t3)">${filtered.length}건</span>
  </div>
  ${oTab==='list'
    ?`<div class="tw"><div class="ts"><table>
    <thead><tr><th></th><th>발주코드</th><th>발주일</th><th>로스팅기간</th><th>출고요청</th><th>카테고리</th><th>품목코드</th><th>품목명</th><th>요청</th><th>완료</th><th>잔여</th><th>진행률</th><th>상태</th><th>비고</th><th></th></tr></thead>
    <tbody>${listRows||'<tr><td colspan="14" class="emp">조건에 맞는 발주가 없습니다</td></tr>'}</tbody>
    </table></div></div>`
    :oTab==='done'
      ?renderDoneOrders(DB.orders)
      :renderProdCards(filtered)}`;
}

function renderProdCards(orders){
  const act=orders.filter(o=>o.status!=='생산완료');
  if(!act.length)return'<div class="emp">진행중인 발주가 없습니다</div>';
  const uc={ov:'var(--wine)',r:'var(--red)',o:'var(--orange)',n:'var(--b1)',done:'var(--b1)'};
  return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">${act.map(o=>{
    const u=urgO(o),r=rem(o),p=pct(o),fc=u==='ov'?'var(--wine)':u==='r'?'var(--red)':u==='o'?'var(--orange)':'var(--gold)';
    return`<div style="background:var(--s1);border:1px solid ${uc[u]||'var(--b1)'};border-radius:var(--r);padding:12px;cursor:pointer" onclick="openOrderDetail(${o.id})">
      <div style="display:flex;justify-content:space-between;margin-bottom:7px">
        <div>${b(getCatColor(o.category),o.category)}${o.bulk?` ${b('bk','BULK')}`:''}</div>
        <button class="btn bp2 bxs" onclick="event.stopPropagation();openProdEntry(${o.id})">입력</button>
      </div>
      <div style="font-size:11px;font-weight:600;margin-bottom:3px">${h(o.itemName)}</div>
      <div style="font-size:9px;color:var(--t3);margin-bottom:7px">${fRoast(o)} · 출고 ${fD(o.shippingDate)}</div>
      <div style="display:flex;gap:10px;font-size:9px;margin-bottom:6px">
        <span style="color:var(--t3)">요청 <b class="mn" style="color:var(--t1)">${fKg(o.requestedKg)}</b></span>
        <span style="color:var(--t3)">완료 <b class="mn" style="color:var(--green)">${fKg(o.completedKg)}</b></span>
        <span style="color:var(--t3)">잔여 <b class="mn" style="color:var(--orange)">${fKg(r)}</b></span>
      </div>
      <div class="prog"><div class="pf" style="width:${p}%;background:${fc}"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:3px">
        ${b(urgBadge(o)[0],urgBadge(o)[1])}<span class="mn" style="font-size:9px;color:var(--t3)">${p}%</span>
      </div>
    </div>`;
  }).join('')}</div>`;
}


// ── 생산완료 탭 렌더 ──
function renderDoneOrders(allFiltered){
  // 생산완료 상태만 + 별도 정렬 상태
  const done=allFiltered.filter(o=>o.status==='생산완료');
  if(!done.length)return'<div class="emp">생산완료된 발주가 없습니다</div>';
  const rows=done.map(o=>{
    const p=pct(o);
    const realRem=remReal(o);  // 음수 허용
    const isOver=realRem<0;    // 초과 생산 여부
    const allEntries=DB.prodEntries.filter(e=>e.orderId===o.id);
    const totalProduced=allEntries.reduce((s,e)=>s+e.kg,0); // 실제 총 생산량 (상한 없음)
    return`<tr onclick="openOrderDetail(${o.id})" style="cursor:pointer;${isOver?'background:rgba(248,113,113,.04)':''}">
      <td class="mn" style="font-size:11px;color:var(--t3)">${fD(o.orderDate)}</td>
      <td class="mn" style="font-size:11px">${fD(o.roastingDateStart)}${o.roastingDateEnd&&o.roastingDateEnd!==o.roastingDateStart?'~'+fD(o.roastingDateEnd):''}</td>
      <td class="mn" style="font-size:11px;color:var(--t3)">${fD(o.shippingDate)}</td>
      <td>${b(getCatColor(o.category),o.category)}</td>
      <td class="mn" style="font-size:11px;font-weight:700;color:var(--gold)">${o.orderCode||'-'}</td>
      <td style="font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h(o.itemName)}</td>
      <td class="mn" style="font-weight:700">${fKg(o.requestedKg)}</td>
      <td class="mn" style="font-weight:700;color:${isOver?'var(--orange)':'var(--green)'}" title="${isOver?'초과 생산: '+fKg(totalProduced):''}">
        ${fKg(totalProduced)}${isOver?` <span style="font-size:10px;color:var(--red);">(+${fKg(-realRem)} 초과)</span>`:''}
      </td>
      <td class="mn" style="font-weight:700;color:${isOver?'var(--red)':'var(--green)'};font-size:13px">
        ${isOver?`<span title="발주량 초과">${fKgSigned(realRem)}</span>`:fKgSigned(realRem)}
      </td>
      <td><div style="display:flex;align-items:center;gap:4px">
        <div style="width:50px;height:3px;background:var(--b1);border-radius:2px;overflow:hidden"><div style="height:100%;background:${isOver?'var(--orange)':'var(--green)'};width:${Math.min(p,100)}%"></div></div>
        <span class="mn" style="font-size:10px;color:${isOver?'var(--orange)':'var(--green)'}">${p}%</span>
      </div></td>
      <td>${b(isOver?'bo':'bg',isOver?'초과생산':'생산완료')}</td>
      <td style="font-size:11px;color:var(--t3);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h(o.note||'')}</td>
      <td onclick="event.stopPropagation()"><button class="btn bd bxs" onclick="event.stopPropagation();deleteOrder(${o.id})">삭제</button></td>
    </tr>`;
  }).join('');
  const overCount=done.filter(o=>remReal(o)<0).length;
  return`<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
    <span style="font-size:12px;color:var(--t3)">총 <b style="color:var(--green)">${done.length}건</b> 생산완료</span>
    ${overCount?`<span style="font-size:11px;color:var(--red);background:rgba(248,113,113,.1);padding:2px 10px;border-radius:20px;border:1px solid rgba(248,113,113,.3)">⚠ 초과생산 ${overCount}건</span>`:''}
  </div>
  <div class="tw"><div class="ts"><table>
    <thead><tr><th>발주일</th><th>로스팅기간</th><th>출고요청</th><th>카테고리</th><th>발주코드</th><th>품목명</th><th>요청량</th><th>생산량</th><th>잔여/초과</th><th>진행률</th><th>상태</th><th>비고</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div></div>`;
}

function deleteOrder(id){
  if(!confirm('이 발주를 삭제하시겠습니까?\n관련 생산 이력도 함께 삭제됩니다.'))return;
  // 삭제 ID 추적 (Supabase 개별 삭제용)
  if(!window._sbDeletedOrderIds) window._sbDeletedOrderIds=new Set();
  if(!window._sbDeletedProdIds) window._sbDeletedProdIds=new Set();
  const prodIds=DB.prodEntries.filter(e=>e.orderId===id).map(e=>e.id);
  prodIds.forEach(pid=>window._sbDeletedProdIds.add(pid));
  window._sbDeletedOrderIds.add(id);
  DB.orders=DB.orders.filter(o=>o.id!==id);
  DB.prodEntries=DB.prodEntries.filter(e=>e.orderId!==id);
  closeOv();
  renderPage(curPage);
}

function openOrderDetail(id){
  const o=DB.orders.find(x=>x.id===id);if(!o)return;
  const r=rem(o),p=pct(o);
  const entries=DB.prodEntries.filter(e=>e.orderId===id).sort((a,b)=>b.date.localeCompare(a.date));
  const[ub,ul]=urgBadge(o);
  const isCompleted=o.status==='생산완료';
  const entryLog=entries.length?`<div class="ss" style="margin-top:14px">생산 입력 이력 (${entries.length}건)

function submitEditRequestedKg(id){
  const newKg=parseFloat(document.getElementById('rk-kg')?.value||0);
  if(!newKg||newKg<=0){alert('발주량은 0보다 커야 합니다');return}
  const orders=DB.orders;
  const i=orders.findIndex(o=>o.id===id);if(i<0)return;
  orders[i].requestedKg=newKg;
  // 완료량이 새 발주량 초과 시 조정
  if(orders[i].completedKg>=newKg) orders[i].completedKg=newKg;
  orders[i].status=calcOrderStatus(orders[i].completedKg,orders[i].requestedKg);
  orders[i].bulk=newKg>=1000;
  DB.orders=orders;
  closeOv();
  openOrderDetail(id);
}

function submitEditOrder(id){
  const g=el=>document.getElementById(el)?.value||'';
  const cat=g('ao-cat');
  const DRIP_CATS=['드립백','커피티백'];
  const isDrip=DRIP_CATS.includes(cat);
  const name=g('ao-name')||(DB.items.find(i=>i.code===g('ao-code'))?.name||'');
  const kg=parseFloat(g('ao-kg'));
  if(!g('ao-od')||!cat||!g('ao-sd')||!kg){alert('필수항목을 확인해주세요');return}
  const sht=isDrip?g('ao-sht-d'):g('ao-sht');
  const shtnote=isDrip?g('ao-shtnote-d'):g('ao-shtnote');
  const isBulk=document.getElementById('ao-bulk')?.checked||kg>=1000;
  const orders=DB.orders;
  const i=orders.findIndex(o=>o.id===id);if(i<0)return;
  orders[i]={...orders[i],
    orderDate:g('ao-od'),
    roastingDateStart:isDrip?'':g('ao-rs'),
    roastingDateEnd:isDrip?'':g('ao-re'),
    shippingDate:g('ao-sd')||null,
    category:cat, itemCode:g('ao-code')||null, itemName:name,
    requestedKg:kg,
    destination:g('ao-dest'), address:g('ao-addr'),
    packagingType:isDrip?'':g('ao-pkg'),
    packagingCount:isDrip?null:parseInt(g('ao-pkgcnt'))||null,
    packagingNote:isDrip?'':g('ao-pkgnote'),
    shippingType:sht, shippingNote:shtnote,
    trackingNo:g('ao-track'), note:g('ao-note'),
    status:g('ao-st'), bulk:isBulk,
    shipStatus:g('ao-sst')
  };
  // 요청무게 변경 시 completedKg 비율 재계산
  if(orders[i].completedKg>orders[i].requestedKg) orders[i].completedKg=orders[i].requestedKg;
  orders[i].status=calcOrderStatus(orders[i].completedKg,orders[i].requestedKg);
  DB.orders=orders;
  closeOv();
  renderPage(curPage);
}

function submitEditProdEntry(entryId, orderId){
  const newKg=parseFloat(document.getElementById('pe-kg')?.value||0);
  const newDate=document.getElementById('pe-date')?.value||TODAY;
  const newBatch=document.getElementById('pe-batch')?.value||'';
  const newNote=document.getElementById('pe-note')?.value||'';

  // 수량 0 입력 시 → 이 이력 삭제 (오입력 취소)
  if(newKg<=0){
    if(!confirm('수량이 0입니다. 이 생산 이력을 삭제하시겠습니까?\n(발주가 생산대기 또는 생산중으로 되돌아갑니다)'))return;
    deleteProdEntry(entryId, orderId);
    return;
  }

  let entries=DB.prodEntries;
  const ei=entries.findIndex(e=>e.id===entryId);if(ei<0)return;
  entries[ei]={...entries[ei],kg:newKg,date:newDate,batchNo:newBatch,note:newNote};
  DB.prodEntries=entries;

  // completedKg 재계산 (모든 이력 합산 → 상태 자동 갱신)
  const orders=DB.orders;
  const oi=orders.findIndex(o=>o.id===orderId);
  if(oi>=0){
    const totalDone=entries.filter(e=>e.orderId===orderId).reduce((s,e)=>s+e.kg,0);
    orders[oi].completedKg=Math.min(totalDone,orders[oi].requestedKg);
    orders[oi].status=calcOrderStatus(orders[oi].completedKg,orders[oi].requestedKg);
    DB.orders=orders;
    sbSaveRowNow('prodEntries', prodToRow(entries[ei]));
    sbSaveRowNow('orders', orderToRow(orders[oi]));
  }
  closeOv();
  openOrderDetail(orderId);
}

function deleteProdEntry(entryId, orderId){
  if(!confirm('이 생산 이력을 삭제하시겠습니까?\n(완료량이 줄어들어 상태가 자동으로 변경됩니다)'))return;
  if(!window._sbDeletedProdIds) window._sbDeletedProdIds=new Set();
  window._sbDeletedProdIds.add(entryId);
  // Supabase 즉시 삭제
  if(window.SB_URL&&window.SB_KEY){
    sbReq('DELETE',SB_TBL.prodEntries,null,`?id=eq.${entryId}`).catch(e=>console.warn('prod delete err',e));
  }
  const entries=DB.prodEntries.filter(e=>e.id!==entryId);
  DB.prodEntries=entries;

  // completedKg 재계산 → 상태 자동 변경 (생산완료 → 생산중/생산대기)
  const orders=DB.orders;
  const oi=orders.findIndex(o=>o.id===orderId);
  if(oi>=0){
    const totalDone=entries.filter(e=>e.orderId===orderId).reduce((s,e)=>s+e.kg,0);
    orders[oi].completedKg=totalDone;
    orders[oi].status=calcOrderStatus(orders[oi].completedKg,orders[oi].requestedKg);
    DB.orders=orders;
    sbSaveRowNow('orders', orderToRow(orders[oi]));
  }
  closeOv();
  // 탭 갱신 후 상세 재오픈
  const orderAfter=DB.orders.find(x=>x.id===orderId);
  // 생산완료탭에서 삭제 후 완료가 아닌 상태로 바뀌면 발주목록 탭으로
  if(oTab==='done'&&orderAfter&&orderAfter.status!=='생산완료'){
    oTab='list';oFSt='';
  }
  renderPage(curPage);
  setTimeout(()=>openOrderDetail(orderId),80);
}

  orders[i].status=status;DB.orders=orders;openOrderDetail(id);

function submitProdEntry(id){
  const kg=parseFloat(document.getElementById('pk')?.value||0);
  if(!kg||kg<=0){alert('수량을 입력해주세요');return}
  const date=document.getElementById('pk-date')?.value||TODAY;
  const batchNo=document.getElementById('pb')?.value||'';
  const note=document.getElementById('pn')?.value||'';
  const entries=DB.prodEntries;
  const newEntry={id:nid(),orderId:id,kg,batchNo,note,date};
  entries.push(newEntry);
  DB.prodEntries=entries;
  // completedKg 재계산 (이력 합산)
  const orders=DB.orders;
  const i=orders.findIndex(o=>o.id===id);if(i<0)return;
  const totalDone=entries.filter(e=>e.orderId===id).reduce((s,e)=>s+e.kg,0);
  orders[i].completedKg=Math.min(totalDone,orders[i].requestedKg);
  orders[i].status=calcOrderStatus(orders[i].completedKg,orders[i].requestedKg);
  DB.orders=orders;
  // 즉시 Supabase 저장 (debounce 기다리지 않고 바로)
  sbSaveRowNow('prodEntries', prodToRow(newEntry));
  sbSaveRowNow('orders', orderToRow(orders[i]));
  // 생산입력 후 항상 발주목록 탭 유지 (생산완료 달성 포함)
  const updatedO=DB.orders.find(x=>x.id===id);
  if(updatedO&&updatedO.status==='생산완료'){
    // 생산완료 달성 - 창 닫고 발주목록 탭 유지
    closeOv();
    if(oTab==='done'){oTab='list';oFSt='';}
    renderPage(curPage);
  } else {
    // 미완료 - 입력창 새로고침 (연속 입력)
    openProdEntry(id);
  }
}

  if(!od){alert('발주일은 필수입니다');return}

  if(!sd){alert('출고 요청일은 필수입니다');return}
  if(!code&&!name){alert('품목코드 또는 품목명을 입력해주세요');return}

    if(!g('ao-pkgcnt')){alert('포장수량은 필수입니다');return}
    if(!g('ao-sht')){alert('배송형태는 필수입니다');return}
  }
  const isBulk=document.getElementById('ao-bulk')?.checked||kg>=1000;
  const sht=isDrip?g('ao-sht-d'):g('ao-sht');
  const shtnote=isDrip?g('ao-shtnote-d'):g('ao-shtnote');
  const isInternal=dest==='내부사용'||sht==='내부사용';
  const orders=DB.orders;
  const newOrderCode=genOrderCode(cat);
  orders.push({
    id:nid(),orderCode:newOrderCode,orderDate:od,
    roastingDateStart:isDrip?'':g('ao-rs'),
    roastingDateEnd:isDrip?'':g('ao-re'),
    shippingDate:sd||null,category:cat,
    itemCode:code||null,itemName:name,requestedKg:kg,completedKg:0,
    destination:dest,address:g('ao-addr'),
    packagingType:isDrip?'':g('ao-pkg'),
    packagingCount:isDrip?null:parseInt(g('ao-pkgcnt'))||null,
    packagingNote:isDrip?'':g('ao-pkgnote'),
    shippingType:isInternal?'내부사용':sht,shippingNote:shtnote,
    trackingNo:g('ao-track'),note:g('ao-note'),
    status:'생산대기',bulk:isBulk,
    shipStatus:isInternal?'done':g('ao-sst')
  });
  DB.orders=orders;closeOv();renderPage(curPage);
}

function uploadOrdersXL(input){
  const file=input.files[0];if(!file)return;
  input.value='';
  triggerLoadXLSXForExport(()=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
        if(rows.length<2){alert('데이터가 없습니다');return}
        // 헤더: 발주일,카테고리,출고요청일,품목코드,품목명,요청무게(kg),로스팅시작일,로스팅마감일,포장형태,포장수량,포장비고,배송형태,배송지,주소,비고
        const dataRows=rows.slice(1).filter(r=>r[4]&&r[5]); // 품목명+요청무게 있는 행만
        if(!dataRows.length){alert('유효한 데이터 행이 없습니다\n(품목명, 요청무게(kg) 필수)');return}
        const DRIP=['드립백','커피티백'];
        let added=0, errors=[];
        const orders=DB.orders;
        dataRows.forEach((r,ri)=>{
          try{
            const cat=String(r[1]||'드립백').trim();
            const isDrip=DRIP.includes(cat);
            const dest=String(r[12]||'').trim();
            const isInternal=dest==='내부사용';
            const kg=parseFloat(String(r[5]).replace(/[^0-9.]/g,''))||0;
            if(!kg){errors.push('행'+(ri+2)+': 요청무게 오류');return}
            orders.push({
              id:nid(),
              orderDate:String(r[0]||TODAY).slice(0,10),
              roastingDateStart:isDrip?'':String(r[6]||'').slice(0,10),
              roastingDateEnd:isDrip?'':String(r[7]||r[6]||'').slice(0,10),
              shippingDate:String(r[2]||'').slice(0,10),
              category:cat,
              itemCode:String(r[3]||'').trim(),
              itemName:String(r[4]||'').trim(),
              requestedKg:kg,
              completedKg:0,
              destination:dest,
              address:String(r[13]||'').trim(),
              packagingType:isDrip?'':String(r[8]||'').trim(),
              packagingCount:isDrip?null:parseInt(r[9])||null,
              packagingNote:isDrip?'':String(r[10]||'').trim(),
              shippingType:isInternal?'내부사용':String(r[11]||'').trim(),
              shippingNote:'',
              trackingNo:'',
              note:String(r[14]||'').trim(),
              status:'생산대기',
              bulk:kg>=1000,
              shipStatus:isInternal?'done':'ready',
            });
            added++;
          }catch(ex){errors.push('행'+(ri+2)+': '+ex.message);}
        });
        DB.orders=orders;
        renderPage(curPage);
        let msg=`✅ ${added}건 발주 등록 완료!`;
        if(errors.length) msg+='\n\n⚠ 오류:\n'+errors.slice(0,5).join('\n');
        alert(msg);
      }catch(ex){alert('파일 읽기 오류: '+ex.message);}
    };
    reader.readAsArrayBuffer(file);
  });
}

function archiveOldOrders(){

  const old=DB.orders.filter(o=>o.status==='생산완료'&&new Date(o.shippingDate||o.orderDate)<twoMoAgo);
  if(!old.length){alert('아카이브할 항목이 없습니다');return}
  const hdr=['발주일','로스팅시작','로스팅마감','출고요청','카테고리','코드','품목명','요청(kg)','완료(kg)','상태','배송지','포장형태','배송형태','송장번호','비고'];
  const rows=old.map(o=>[o.orderDate,o.roastingDateStart,o.roastingDateEnd,o.shippingDate,o.category,o.itemCode||'',o.itemName,o.requestedKg,o.completedKg,o.status,o.destination||'',o.packagingType||'',o.shippingType||'',o.trackingNo||'',o.note||''].map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(','));
  const csv='\uFEFF'+[hdr.join(','),...rows].join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=`발주아카이브_${TODAY}.csv`;a.click();
  // remove archived
  DB.orders=DB.orders.filter(o=>!old.find(x=>x.id===o.id));
  renderPage(curPage);
}

let shipCalY=new Date().getFullYear(), shipCalM=new Date().getMonth()+1;

function renderShipping(el){
  // 드립백/커피티백 제외 - 2차가공 외부출고만
  const EXCL_CATS=['드립백','커피티백'];
  const all=DB.orders.filter(o=>!EXCL_CATS.includes(o.category)&&o.shippingType!=='내부사용'&&o.destination!=='내부사용');
  const pending=all.filter(o=>o.shipStatus!=='done');
  const done=all.filter(o=>o.shipStatus==='done');
  const dests=[...new Set(all.map(o=>o.destination).filter(Boolean))];

  el.innerHTML=`
  <div class="ph">
    <div><div class="pt">2차가공 출고관리</div><div class="ps">캡슐 · 콜드브루 · 코스트코 · 인스턴트 외부출고만 표시 &nbsp;🚛 화물 &nbsp;📦 택배</div></div>
    <div class="pa"><button class="btn bp2" onclick="openAddOrder()">+ 발주/출고 등록</button></div>
  </div>
  <div class="tabs">
    <div class="tab ${shipTab==='cal'?'on':''}"    onclick="shipTab='cal';renderShipping(document.getElementById('page-shipping'))">📅 캘린더</div>
    <div class="tab ${shipTab==='pending'?'on':''}" onclick="shipTab='pending';renderShipping(document.getElementById('page-shipping'))">출고 예정/대기 (${pending.length})</div>
    <div class="tab ${shipTab==='done'?'on':''}"    onclick="shipTab='done';renderShipping(document.getElementById('page-shipping'))">출고 완료 (${done.length})</div>
  </div>
  <div id="ship-body"></div>`;

  const body=document.getElementById('ship-body');
  if(shipTab==='cal')   renderShipCal(body, all);

  const byDate={};
  all.filter(o=>o.status!=='취소').forEach(o=>{
    const d=o.shippingDate;if(!d)return;
    if(!byDate[d])byDate[d]=[];
    byDate[d].push(o);
  });

  const stColor={delay:'var(--red)',ready:'var(--yellow)',done:'var(--green)'};
  const stLabel={delay:'지연',ready:'대기',done:'완료'};

  // 셀 생성
  let cells='';
  for(let i=0;i<firstDow;i++) cells+=`<div style="min-height:110px;border-right:1px solid var(--b1);border-bottom:1px solid var(--b1)"></div>`;

  for(let d=1;d<=lastDate;d++){

    const ds=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    const isPast=ds<TODAY;

    const readyN=dayOrders.filter(o=>o.shipStatus==='ready').length;
    const doneN =dayOrders.filter(o=>o.shipStatus==='done').length;

    // 상태 요약 뱃지

      ${delayN?`<div style="display:flex;align-items:center;gap:2px;font-size:9px;color:var(--red)"><div style="width:5px;height:5px;border-radius:50%;background:var(--red)"></div>지연 ${delayN}</div>`:''}
      ${readyN?`<div style="display:flex;align-items:center;gap:2px;font-size:9px;color:var(--yellow)"><div style="width:5px;height:5px;border-radius:50%;background:var(--yellow)"></div>대기 ${readyN}</div>`:''}
      ${doneN ?`<div style="display:flex;align-items:center;gap:2px;font-size:9px;color:var(--green)"><div style="width:5px;height:5px;border-radius:50%;background:var(--green)"></div>완료 ${doneN}</div>`:''}`;

    const itemBadges=dayOrders.slice(0,3).map(o=>{
      const sc=stColor[o.shipStatus||'ready'];

      const catCls=getCatColor(o.category);
      return`<div onclick="event.stopPropagation();openShipDetail(${o.id})" style="
        display:flex;align-items:center;gap:3px;
        background:${sc}18;border-left:2px solid ${sc};
        border-radius:3px;padding:2px 5px;margin-bottom:2px;cursor:pointer;
        transition:background .08s

        <span style="font-size:10px;flex-shrink:0">${shtIcon}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:9px;font-weight:600;color:${sc};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h(o.itemName.slice(0,13))}</div>

        </div>
      </div>`;

    cells+=`<div onclick="openShipDayPanel('${ds}')" style="

      padding:5px;cursor:${dayOrders.length?'pointer':'default'};

    " onmouseover="${dayOrders.length?"this.style.background='var(--s2)'":''}" onmouseout="this.style.background='${isT?'rgba(200,169,110,.05)':''}'">
      <!-- 날짜 숫자 -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;${isT?'background:var(--gold);color:#000':isSun?'color:var(--red)':isSat?'color:var(--blue)':'color:var(--t2)'}">${d}</div>
        ${dayOrders.length?`<div style="font-size:8px;color:var(--t3)" class="mn">${fKg(totalKg)}</div>`:''}
      </div>
      <!-- 상태 요약 (건수 있을 때만) -->
      ${dayOrders.length?`<div style="display:flex;gap:6px;margin-bottom:4px;flex-wrap:wrap">${statusDots}</div>`:''}
      <!-- 아이템 목록 -->
      ${itemBadges}
      ${extra>0?`<div style="font-size:8px;color:var(--t3);padding:1px 4px">+${extra}건 더</div>`:''}
    </div>`;
  }
  const fill=(42-(firstDow+lastDate));
  for(let i=0;i<(fill<0?fill+7:fill<7?fill:0);i++) cells+=`<div style="min-height:110px;border-right:1px solid var(--b1);border-bottom:1px solid var(--b1)"></div>`;

  // 범례
  const legend=`<div style="display:flex;gap:12px;font-size:9px;color:var(--t3);align-items:center">
    <span style="display:flex;align-items:center;gap:3px"><div style="width:8px;height:8px;border-left:2px solid var(--red);background:rgba(248,113,113,.15);border-radius:1px"></div> 생산지연</span>
    <span style="display:flex;align-items:center;gap:3px"><div style="width:8px;height:8px;border-left:2px solid var(--yellow);background:rgba(251,191,36,.15);border-radius:1px"></div> 출고대기</span>
    <span style="display:flex;align-items:center;gap:3px"><div style="width:8px;height:8px;border-left:2px solid var(--green);background:rgba(74,222,128,.15);border-radius:1px"></div> 출고완료</span>
    <span style="margin-left:4px">· 아이템 클릭 → 상세 수정 / 날짜 클릭 → 일별 전체 조회</span>
  </div>`;

  el.innerHTML=`
  <!-- 캘린더 헤더 -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn bs bsm" onclick="shipCalNav(-1)">‹</button>
      <span class="mn" style="font-size:15px;font-weight:600">${y}.${String(m).padStart(2,'0')}</span>
      <button class="btn bs bsm" onclick="shipCalNav(1)">›</button>
      <button class="btn bp2 bsm" onclick="shipCalToday()">오늘</button>
    </div>
    ${legend}
  </div>
  <!-- 캘린더 -->
  <div style="background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden">
    <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--b1)">
      ${['SUN','MON','TUE','WED','THU','FRI','SAT'].map((d,i)=>`<div style="padding:7px 0;text-align:center;font-size:8px;font-weight:700;color:${i===0?'var(--red)':i===6?'var(--blue)':'var(--t3)'};letter-spacing:1.5px">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr)">${cells}</div>
  </div>`;
}

function markShipDone(id){
  const orders=DB.orders;const i=orders.findIndex(o=>o.id===id);if(i<0)return;

}

function deductLeave(empId,type,amount,date,note){
  const lb=DB.leaveBalance;const i=lb.findIndex(x=>x.empId===empId);if(i<0)return;
  if(type==='annual')lb[i].annual=Math.max(0,(lb[i].annual||0)-amount);
  if(type==='altDay')lb[i].altDay=Math.max(0,(lb[i].altDay||0)-amount);
  DB.leaveBalance=lb;
  const recs=DB.leaveRecords;
  recs.push({id:nid(),empId,type,amount,date,note:note||'자동차감'});
  DB.leaveRecords=recs;
}

    const catCells=dates.map(({d,ds,dow})=>{

          ${Object.entries(WORK_TYPES).map(([k,v])=>`<option value="${k}" ${wt===k?'selected':''}>${v.label}</option>`).join('')}
        </select></td>`;
    }).join('');
    const timeCells=dates.map(({d,ds,dow})=>{
      const isSun=dow===0,isSat=dow===6,isHol=isHoliday(ds);
      const existing=DB.calEvents.find(e=>e.cat===1&&e.empId===emp.id&&e.dateStart===ds);
      const wt=existing?.workType||(isSun||isSat||isHol?'off':'production');
      const tv=existing?.startTime||'';
      const isOff=wt==='off'||LEAVE_TYPES.includes(wt);
      return`<td style="padding:2px;border-right:1px solid var(--b1)">
        <input type="text" maxlength="5" value="${tv}" placeholder="${isOff?'-':'07:00'}" ${isOff?'disabled':''}
          oninput="this.value=this.value.replace(/[^0-9:]/g,'');if(this.value.replace(':','').length===4&&!this.value.includes(':'))this.value=this.value.slice(0,2)+':'+this.value.slice(2)"
          style="background:${isOff?'var(--s3)':'var(--s2)'};border:1px solid var(--b1);color:${isOff?'var(--t3)':'var(--t1)'};border-radius:3px;font-size:10px;padding:2px 3px;width:50px;text-align:center;font-family:'IBM Plex Mono',monospace;outline:none;${isOff?'cursor:not-allowed;opacity:.4':''}"
          data-type="time" data-empid="${emp.id}" data-date="${ds}">
      </td>`;
    }).join('');
    return`<tr style="border-bottom:1px solid var(--b2)">
      <td rowspan="2" style="padding:4px 8px;white-space:nowrap;border-right:1px solid var(--b1);position:sticky;left:0;background:var(--s2);z-index:1;vertical-align:middle">
        <div style="display:flex;align-items:center;gap:5px">
          <div class="av" style="width:18px;height:18px;background:${emp.color};font-size:8px;color:#000">${emp.name[0]}</div>
          <span style="font-size:10px;font-weight:600">${emp.name}</span>
        </div>
      </td>${catCells}</tr>

  }).join('');

  const dateHeaders=dates.map(({d,dow,ds})=>{
    const isHol=isHoliday(`${schedY}-${String(schedM).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
