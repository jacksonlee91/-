  }).join('');

  openOv(`<div class="dr dr-xl"><div class="mh">
    <div><div class="mt">📋 ${schedY}.${String(schedM).padStart(2,'0')} 근무 일괄 등록</div>
    <div style="font-size:9px;color:var(--t3);margin-top:2px">위행: 근무유형 선택 · 아래행: 출근시간 입력 · 🎌공휴일 자동휴무 · 연차/대체선택시 잔여량 자동차감</div></div>
    <div style="display:flex;gap:6px;align-items:center">
      <div style="display:flex;gap:5px;flex-wrap:wrap;font-size:9px">
        ${Object.entries(WORK_TYPES).map(([k,v])=>`<span style="display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:8px;background:${v.bg};color:${v.color}">${v.label}</span>`).join('')}
      </div>
      <button class="xb" onclick="closeOv()">×</button>
    </div>
  </div>
  <div style="padding:12px;overflow-x:auto;flex:1">
    <div class="bsg"><table>
      <thead><tr><th class="emp-th">직원</th>${dateHeaders}</tr></thead>
      <tbody>${empRows}</tbody>
    </table></div>
    <div style="margin-top:10px;padding:8px 11px;background:var(--s2);border-radius:5px;font-size:10px;color:var(--t3)">
      💡 시간 입력예: 0700 → 07:00 자동변환 · 반차는 시간도 입력해주세요 · 등록 후 셀 클릭으로 개별 수정 가능
    </div>
  </div>
  <div style="padding:11px 12px;border-top:1px solid var(--b1);display:flex;gap:6px">
    <button class="btn bg2" style="flex:1" onclick="closeOv()">취소</button>
    <button class="btn bp2" style="flex:2" onclick="submitBulkSched()">💾 저장</button>
  </div></div>`);
}

function bsCatCh(sel,empId,date){
  const wt=sel.value;const wtInfo=WORK_TYPES[wt]||WORK_TYPES.production;
  sel.style.background=wtInfo.bg;sel.style.borderColor=wtInfo.color+'44';sel.style.color=wtInfo.color;
  const ti=document.querySelector(`input[data-type="time"][data-empid="${empId}"][data-date="${date}"]`);
  const isOff=wt==='off'||LEAVE_TYPES.includes(wt);
  if(ti){ti.disabled=isOff;ti.style.opacity=isOff?'0.4':'1';ti.style.cursor=isOff?'not-allowed':'text';if(isOff)ti.value=''}
}

function submitBulkSched(){
  const catSels=document.querySelectorAll('select[data-type="cat"][data-empid][data-date]');
  const mStr=`${schedY}-${String(schedM).padStart(2,'0')}`;
  const keep=DB.calEvents.filter(e=>!(e.cat===1&&e.dateStart.startsWith(mStr)));
  const newEvs=[...keep];
  const leaveDed=[];
  catSels.forEach(sel=>{
    const empId=parseInt(sel.dataset.empid),date=sel.dataset.date,wt=sel.value;
    const ti=document.querySelector(`input[data-type="time"][data-empid="${empId}"][data-date="${date}"]`);
    let st=ti?.value||'';
    if(st&&!st.includes(':')&&st.length>=4)st=st.slice(0,2)+':'+st.slice(2,4);
    const emp=DB.employees.find(e=>e.id===empId);
    const wtInfo=WORK_TYPES[wt]||WORK_TYPES.production;
    const isOff=wt==='off'||LEAVE_TYPES.includes(wt);
    newEvs.push({id:nid(),cat:1,title:`${emp?.name||'?'} ${wtInfo.label}`,dateStart:date,dateEnd:date,empId,startTime:isOff?'':st,workType:wt,note:''});
    if(wt==='annual')leaveDed.push({empId,type:'annual',amount:1,date});
    else if(wt==='halfAM'||wt==='halfPM')leaveDed.push({empId,type:'annual',amount:0.5,date});
    else if(wt==='altDay')leaveDed.push({empId,type:'altDay',amount:1,date});
  });
  DB.calEvents=newEvs;
  // 연차 차감
  const lb=DB.leaveBalance;const recs=DB.leaveRecords;
  leaveDed.forEach(d=>{
    const i=lb.findIndex(x=>x.empId===d.empId);if(i<0)return;
    if(d.type==='annual')lb[i].annual=Math.max(0,(lb[i].annual||0)-d.amount);
    if(d.type==='altDay')lb[i].altDay=Math.max(0,(lb[i].altDay||0)-d.amount);
    recs.push({id:nid(),...d,note:'일괄등록 자동차감'});
  });
  DB.leaveBalance=lb;DB.leaveRecords=recs;
  closeOv();renderSchedule(document.getElementById('page-schedule'));
}

// ── 엑셀 업로드 (실제 양식 파싱) ──
function triggerLoadXLSX(cb){
  if(typeof XLSX!=='undefined'){cb();return;}
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=cb;s.onerror=()=>alert('XLSX 라이브러리 로드 실패. 인터넷 연결을 확인해주세요.');
  document.head.appendChild(s);
}

// 드래그앤드롭 핸들러
function xlDropHandler(event){
  event.preventDefault();
  const zone=document.getElementById('xl-drop-zone');
  if(zone){zone.style.borderColor='var(--b2)';zone.style.background='var(--s2)';}
  const files=event.dataTransfer?.files;
  if(!files||!files[0])return;
  const file=files[0];
  if(!file.name.match(/\.xlsx?$/i)){alert('xlsx 또는 xls 파일만 지원됩니다.');return;}
  triggerLoadXLSX(()=>_parseSchedXL(file));
}

function handleSchedXL(input){
  const file=input.files[0];if(!file)return;
  input.value='';
  triggerLoadXLSX(()=>_parseSchedXL(file));
}

// 핵심 파서: 로스터리 근무표 양식
// 구조: 행2=연도/월, 행4=요일헤더(C2=일,C4=월...C14=토)
// 주차 블록: 날짜행(숫자2개 이상) → 참고사항/사무/생산/생두/생산/휴무자 행 (7행)
// 날짜 컬럼: C2,C4,C6,C8,C10,C12,C14 (각 요일)
// 직원 형식: "이름(HH:MM-)" 또는 "이름1,이름2(HH:MM-)" 또는 단독 이름(사무)
function _parseSchedXL(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});

      // 시트 선택: 이름에 월이 포함된 시트 또는 첫 번째
      let ws=null, sheetName='';
      // 현재 schedM 에 맞는 시트 찾기
      const monthNames=['01월','02월','03월','04월','05월','06월','07월','08월','09월','10월','11월','12월'];
      const targetSheet=monthNames[schedM-1];
      if(wb.SheetNames.includes(targetSheet)){ws=wb.Sheets[targetSheet];sheetName=targetSheet;}
      else{ws=wb.Sheets[wb.SheetNames[0]];sheetName=wb.SheetNames[0];}

      const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});

      // 연도/월 추출 (행2 = index 1)
      let year=schedY, month=schedM;
      const r1=rows[1]||[];
      for(let c=0;c<r1.length;c++){
        const v=r1[c];
        if(typeof v==='number'&&v>=2020&&v<=2030)year=v;
        if(typeof v==='number'&&v>=1&&v<=12&&v!==year)month=v;
      }

      // 날짜행 찾기: 2개 이상의 1~31 숫자가 있는 행
      const DATE_COLS=[1,3,5,7,9,11,13]; // 0-based: C2=idx1, C4=idx3...
      const dateRowIdxs=[];
      rows.forEach((row,ri)=>{
        if(!row)return;
        const nums=DATE_COLS.filter(ci=>row[ci]!=null&&typeof row[ci]==='number'&&row[ci]>=1&&row[ci]<=31);
        if(nums.length>=2)dateRowIdxs.push(ri);
      });

      // 직원 이름 → empId 매핑
      const nameToId={};
      DB.employees.forEach(e=>{nameToId[e.name]=e.id;});
      // 별명 처리
      const aliasMap={};
      DB.employees.forEach(e=>{
        const short=e.name.slice(0,2);
        if(!aliasMap[short])aliasMap[short]=e.id;
        aliasMap[e.name]=e.id;
      });

      // 카테고리 → workType 매핑
      const catToWT={'생산':'production','사무':'office','생두':'greens'};

      const results=[];

      dateRowIdxs.forEach(dri=>{
        // 이 날짜행에서 col→date 맵 만들기
        const colDateMap={};
        const dateRow=rows[dri]||[];
        DATE_COLS.forEach(ci=>{
          const v=dateRow[ci];
          if(typeof v==='number'&&v>=1&&v<=31){
            const d=String(v).padStart(2,'0');
            const mo=String(month).padStart(2,'0');
            colDateMap[ci]=`${year}-${mo}-${d}`;
          }
        });
        if(!Object.keys(colDateMap).length)return;

        // 이후 최대 7행을 스캔
        for(let offset=1;offset<=7;offset++){
          const ri=dri+offset;
          const row=rows[ri];if(!row)continue;
          const cat=String(row[0]||'').trim();
          if(!cat||cat==='휴무자'||cat==='참고사항')continue;
          const wt=catToWT[cat];
          if(!wt)continue;

          // 각 날짜 컬럼 파싱
          DATE_COLS.forEach(ci=>{
            const date=colDateMap[ci];if(!date)return;
            const cell=row[ci];if(cell==null)return;
            const cellStr=String(cell).trim();if(!cellStr)return;

            // "이름1(HH:MM-),이름2" 또는 "이름1,이름2(HH:MM-)" 형태 파싱
            // 먼저 시간 추출
            const timeMatch=cellStr.match(/(\d{1,2}):(\d{2})\s*-/);
            const startTime=timeMatch?`${timeMatch[1].padStart(2,'0')}:${timeMatch[2]}`:'';

            // 이름 추출: 괄호 안 내용 제거 후 쉼표 분리
            const noParens=cellStr.replace(/\([^)]*\)/g,'').replace(/\s+/g,' ').trim();
            const nameParts=noParens.split(/[,，]/).map(s=>s.trim()).filter(Boolean);

            nameParts.forEach(rawName=>{
              // 정확한 이름 매칭
              let empId=nameToId[rawName];
              if(!empId){
                // 부분 매칭 시도
                const match=Object.keys(nameToId).find(n=>rawName.includes(n)||n.includes(rawName));
                if(match)empId=nameToId[match];
              }
              if(!empId){
                // 별명 매칭
                empId=aliasMap[rawName]||aliasMap[rawName.slice(0,2)];
              }
              if(!empId)return;

              // 같은 직원+날짜 중복 제거 (앞서 더 이른 시간이 있으면 스킵)
              const existing=results.find(r=>r.empId===empId&&r.date===date);
              if(existing){
                // 더 이른 시간이면 업데이트
                if(startTime&&(!existing.startTime||startTime<existing.startTime)){
                  existing.startTime=startTime;
                  if(wt!=='off')existing.workType=wt;
                }
                return;
              }
              results.push({empId,date,startTime,workType:wt,note:cellStr.slice(0,40)});
            });
          });
        }
      });

      // 참고사항 행도 cat4 이벤트로 추가
      const noteResults=[];
      dateRowIdxs.forEach(dri=>{
        const colDateMap={};
        const dateRow=rows[dri]||[];
        DATE_COLS.forEach(ci=>{const v=dateRow[ci];if(typeof v==='number'&&v>=1&&v<=31){const d=String(v).padStart(2,'0');colDateMap[ci]=`${year}-${String(month).padStart(2,'0')}-${d}`;}});

        const noteRow=rows[dri+1];
        if(!noteRow||String(noteRow[0]||'').trim()!=='참고사항')return;
        DATE_COLS.forEach(ci=>{
          const date=colDateMap[ci];if(!date)return;
          const cell=noteRow[ci];if(!cell)return;
          const note=String(cell).trim();if(!note)return;
          noteResults.push({date,note});
        });
      });

      if(!results.length){
        alert('파싱된 스케줄 데이터가 없습니다.\n시트명: '+sheetName+'\n양식을 확인해주세요.');return;
      }

      // 미리보기 모달
      const preview=results.slice(0,12).map(r=>{
        const emp=DB.employees.find(e=>e.id===r.empId);
        return`<tr>
          <td>${r.date.slice(5).replace('-','/')}</td>
          <td><div style="display:flex;align-items:center;gap:5px">${emp?`<div style="width:10px;height:10px;border-radius:50%;background:${emp.color}"></div>`:''}${emp?.name||'?'}</div></td>
          <td>${WORK_TYPES[r.workType]?.label||r.workType}</td>
          <td class="mn">${r.startTime||'-'}</td>
          <td style="font-size:9px;color:var(--t3);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.note||''}</td>
        </tr>`;
      }).join('');

      // JSON을 안전하게 직렬화
      const safeResults=JSON.stringify(results).replace(/</g,'\\u003c').replace(/>/g,'\\u003e');
      const safeNotes=JSON.stringify(noteResults).replace(/</g,'\\u003c').replace(/>/g,'\\u003e');

      openOv(`<div class="mb2" style="width:600px"><div class="mh"><div class="mt">📥 엑셀 업로드 미리보기</div><button class="xb" onclick="closeOv()">×</button></div>
      <div class="mb">
        <div style="display:flex;gap:12px;margin-bottom:12px;padding:10px 14px;background:var(--s2);border-radius:6px;font-size:11px">
          <span>📅 시트: <b>${sheetName}</b></span>
          <span>✅ 스케줄: <b>${results.length}건</b></span>
          <span>📌 참고사항: <b>${noteResults.length}건</b></span>
          <span style="color:var(--red)">⚠ ${year}.${String(month).padStart(2,'0')} 기존 스케줄 대체</span>
        </div>
        <div class="tw"><div class="ts"><table>
          <thead><tr><th>날짜</th><th>직원</th><th>유형</th><th>출근시간</th><th>원본 내용</th></tr></thead>
          <tbody>${preview}${results.length>12?`<tr><td colspan="5" style="text-align:center;color:var(--t3);padding:8px">외 ${results.length-12}건...</td></tr>`:''}</tbody>
        </table></div></div>
        <div style="display:flex;gap:7px;margin-top:12px">
          <button class="btn bg2" style="flex:1" onclick="closeOv()">취소</button>
          <button class="btn bp2" style="flex:2" onclick="applySchedXL(${safeResults},${year},'${String(month).padStart(2,'0')}',${safeNotes})">적용하기</button>
        </div>
      </div></div>`,true);
    }catch(err){
      console.error(err);
      alert('파싱 실패: '+err.message+'\n\n파일이 올바른 양식인지 확인해주세요.');
    }
  };
  reader.readAsArrayBuffer(file);
}

function applySchedXL(results,year,mPad,noteResults){
  const mStr=`${year}-${mPad}`;
  // 해당 월 기존 cat1 스케줄 제거
  const keep=DB.calEvents.filter(e=>!(e.cat===1&&e.dateStart.startsWith(mStr)));
  const newEvs=[...keep];
  const leaveDed=[];

  results.forEach(r=>{
    const emp=DB.employees.find(e=>e.id===r.empId);
    const wt=r.workType||'production';
    const wtInfo=WORK_TYPES[wt]||WORK_TYPES.production;
    const isOff=wt==='off'||LEAVE_TYPES.includes(wt);
    newEvs.push({
      id:nid(),cat:1,
      title:`${emp?.name||'?'} ${wtInfo.label}`,
      dateStart:r.date,dateEnd:r.date,
      empId:r.empId,
      startTime:isOff?'':r.startTime||'',
      workType:wt,
      note:r.note||''
    });
    if(wt==='annual')leaveDed.push({empId:r.empId,type:'annual',amount:1,date:r.date});
    else if(wt==='halfAM'||wt==='halfPM')leaveDed.push({empId:r.empId,type:'annual',amount:0.5,date:r.date});
    else if(wt==='altDay')leaveDed.push({empId:r.empId,type:'altDay',amount:1,date:r.date});
  });

  // 참고사항 → cat4 이벤트
  if(noteResults&&noteResults.length){
    noteResults.forEach(n=>{
      newEvs.push({id:nid(),cat:4,title:n.note.slice(0,40),dateStart:n.date,dateEnd:n.date,empId:null,startTime:'',workType:'',note:n.note});
    });
  }

  DB.calEvents=newEvs;

  // 연차/대체 차감
  const lb=DB.leaveBalance;const recs=DB.leaveRecords;
  leaveDed.forEach(d=>{
    const i=lb.findIndex(x=>x.empId===d.empId);if(i<0)return;
    if(d.type==='annual')lb[i].annual=Math.max(0,(lb[i].annual||0)-d.amount);
    if(d.type==='altDay')lb[i].altDay=Math.max(0,(lb[i].altDay||0)-d.amount);
    recs.push({id:nid(),...d,note:'엑셀업로드 자동차감'});
  });
  DB.leaveBalance=lb;DB.leaveRecords=recs;

  closeOv();
  schedY=parseInt(year);schedM=parseInt(mPad);
  renderSchedule(document.getElementById('page-schedule'));
}

// BACKUP — 백업 / 데이터 관리
// ═══════════════════════════════════════════════════
function checkDataAlerts(){
  const now=new Date();const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const alerts=[];
  if(DB.lastDataAlert!==ym)alerts.push({type:'monthly',msg:`📅 이번 달(${ym}) 데이터 내보내기를 잊지 마세요.`,btn:'백업 메뉴로',page:'backup'});
  const pd=DB.pendingDelete;const now_=Date.now();
  pd.forEach(item=>{
    const diff=Math.ceil((new Date(item.purgeAt).getTime()-now_)/(1000*60*60*24));
    if(diff<=7&&diff>0)alerts.push({type:'purge',msg:`⚠ "${item.label}" 데이터 완전삭제 ${diff}일 전입니다.`,btn:'백업 확인',page:'backup'});
    else if(diff<=0){alerts.push({type:'purge',msg:`🗑 "${item.label}" 데이터가 완전삭제됩니다.`,btn:'백업 확인',page:'backup'});}
  });
  // 실제 만료 처리
  if(pd.some(item=>new Date(item.purgeAt).getTime()<=now_)){
    DB.pendingDelete=pd.filter(item=>new Date(item.purgeAt).getTime()>now_);
  }
  return alerts;
}

  const pd=DB.pendingDelete;
  const alerts=checkDataAlerts();
  function sz(key){try{const v=localStorage.getItem('mops4_'+key)||'';return Math.round(v.length/1024)+'KB';}catch{return'-'}}
  const DATA_TYPES=[

    {key:'prodEntries',label:'생산 입력 이력', icon:'◉'},

    {key:'leaveRecords',label:'연차 사용 기록', icon:'◐'},
    {key:'overtimeRecords',label:'추가근무 기록', icon:'⊕'},
    {key:'employees',  label:'직원 정보',       icon:'●'},
    {key:'items',      label:'품목 마스터',      icon:'◎'},
  ];

  const alertBanners=alerts.map(a=>`<div class="alert-banner" style="margin-bottom:8px">

function triggerLoadXLSXForExport(cb){
  if(typeof XLSX!=='undefined'){cb();return;}
  const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=cb;s.onerror=()=>alert('XLSX 라이브러리 로드 실패. 인터넷 연결을 확인해주세요.');document.head.appendChild(s);
}

function exportSingle(key,label){
  triggerLoadXLSXForExport(()=>{
    const data=Array.isArray(DB[key])?DB[key]:(DB[key]?[DB[key]]:[]);
    if(!data.length){alert('내보낼 데이터가 없습니다');return;}
    const ws=XLSX.utils.json_to_sheet(data);
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,label.slice(0,30));
    XLSX.writeFile(wb,`${label}_${TODAY}.xlsx`);
  });
}

function archiveSingle(key,label){
  if(!confirm(`"${label}" 데이터를 보관 처리하시겠습니까?\n내려받기 후 삭제대기(30일) 상태로 이동됩니다.`))return;
  triggerLoadXLSXForExport(()=>{
    exportSingle(key,label);
    const snap=JSON.stringify(DB[key]||[]);
    const pd=DB.pendingDelete;
    const purge=new Date(Date.now()+30*24*60*60*1000).toISOString();
    pd.push({id:nid(),key,label,deletedAt:new Date().toISOString(),purgeAt:purge,snapshot:snap});
    DB.pendingDelete=pd;
    sd(key,[]);
    alert(`"${label}" 데이터가 삭제대기로 이동. 30일 후 완전삭제됩니다.`);
    renderBackup(document.getElementById('page-backup'));
  });
}

function restoreItem(id){
  const pd=DB.pendingDelete;const item=pd.find(x=>x.id===id);if(!item)return;
  if(!confirm(`"${item.label}" 데이터를 복원하시겠습니까?`))return;
  try{sd(item.key,JSON.parse(item.snapshot||'[]'));}catch{sd(item.key,[]);}
  DB.pendingDelete=pd.filter(x=>x.id!==id);
  alert('복원 완료!');renderBackup(document.getElementById('page-backup'));
}
function purgeNow(id){
  const pd=DB.pendingDelete;const item=pd.find(x=>x.id===id);if(!item)return;
  if(!confirm(`"${item.label}"를 지금 즉시 완전삭제하시겠습니까?\n되돌릴 수 없습니다.`))return;
  DB.pendingDelete=pd.filter(x=>x.id!==id);
  renderBackup(document.getElementById('page-backup'));
}

function exportAllExcel(thisMonthOnly=false){

    const wb=XLSX.utils.book_new();

        배송지:o.destination||'',주소:o.address||'',포장형태:o.packagingType||'',포장수량:o.packagingCount||'',
        배송형태:o.shippingType||'',송장번호:o.trackingNo||'',비고:o.note||''
      })));XLSX.utils.book_append_sheet(wb,ws,'발주생산');}

    // 2. 생산 입력 이력
    let pe=(DB.prodEntries||[]);
    if(thisMonthOnly)pe=pe.filter(e=>e.date?.startsWith(mStr));
    if(pe.length){const ws=XLSX.utils.json_to_sheet(pe.map(e=>({날짜:e.date,배치번호:e.batchNo||'',수량kg:e.kg,비고:e.note||''})));XLSX.utils.book_append_sheet(wb,ws,'생산이력');}

    // 3. 근무 스케줄
    let schEvs=(DB.calEvents||[]).filter(e=>e.cat===1);
    if(thisMonthOnly)schEvs=schEvs.filter(e=>e.dateStart?.startsWith(mStr));
    if(schEvs.length){const ws=XLSX.utils.json_to_sheet(schEvs.map(e=>({
      날짜:e.dateStart,직원:em[e.empId]?.name||'',근무유형:WORK_TYPES[e.workType]?.label||e.workType,출근시간:e.startTime||'',업무내용:e.note||''
    })));XLSX.utils.book_append_sheet(wb,ws,'근무스케줄');}

    // 4. 연차 현황
    const lbal=(DB.leaveBalance||[]);
    if(lbal.length){const ws=XLSX.utils.json_to_sheet(lbal.map(b=>({
      직원:em[b.empId]?.name||'',입사일:b.joinDate||'',연차잔여:b.annual,대체휴일잔여:b.altDay,법정연차:calcAnnualLeave(b.joinDate)
    })));XLSX.utils.book_append_sheet(wb,ws,'연차현황');}

    // 5. 연차 기록
    let lr=(DB.leaveRecords||[]);
    if(thisMonthOnly)lr=lr.filter(r=>r.date?.startsWith(mStr));
    if(lr.length){const ws=XLSX.utils.json_to_sheet(lr.map(r=>({날짜:r.date,직원:em[r.empId]?.name||'',유형:r.type,수량:r.amount,비고:r.note||''})));XLSX.utils.book_append_sheet(wb,ws,'연차기록');}

    // 6. 추가근무
    let ot=(DB.overtimeRecords||[]);
    if(thisMonthOnly)ot=ot.filter(r=>r.date?.startsWith(mStr));
    if(ot.length){const ws=XLSX.utils.json_to_sheet(ot.map(r=>({날짜:r.date,직원:em[r.empId]?.name||'',유형:OT_TYPES[r.type]||r.type,시간h:r.hours,비고:r.note||''})));XLSX.utils.book_append_sheet(wb,ws,'추가근무');}

    // 7. 출고관리
    let ship=(DB.orders||[]);
    if(thisMonthOnly)ship=ship.filter(o=>o.shippingDate?.startsWith(mStr));
    if(ship.length){const ws=XLSX.utils.json_to_sheet(ship.map(o=>({출고일:o.shippingDate,출고상태:SHIP_STATUS[o.shipStatus]||'',카테고리:o.category,품목코드:o.itemCode||'',품목명:o.itemName,중량kg:o.requestedKg,포장:o.packagingType||'',배송형태:o.shippingType||'',배송지:o.destination||'',주소:o.address||'',송장번호:o.trackingNo||'',비고:o.note||''})));XLSX.utils.book_append_sheet(wb,ws,'출고관리');}

    // 8. 직원 목록
    const emps=(DB.employees||[]);
    if(emps.length){const ws=XLSX.utils.json_to_sheet(emps.map(e=>({이름:e.name,역할:e.role,직책:e.position||'',권한:PERM_KR[e.permission]||e.permission,입사일:DB.leaveBalance.find(b=>b.empId===e.id)?.joinDate||'',상태:e.active?'활성':'비활성'})));XLSX.utils.book_append_sheet(wb,ws,'직원목록');}

    if(!wb.SheetNames.length){alert('내보낼 데이터가 없습니다');return;}
    XLSX.writeFile(wb,`MOMOS_OPS_${thisMonthOnly?mStr:'전체'}_${TODAY}.xlsx`);
    if(!thisMonthOnly){
      const now2=new Date();DB.lastDataAlert=`${now2.getFullYear()}-${String(now2.getMonth()+1).padStart(2,'0')}`;
    }
  });
}

function renderSchedCal(){
  const wrap=document.getElementById('sched-cal');if(!wrap)return;
  const em=empMap();
  const y=schedY,m=schedM;
  const first=new Date(y,m-1,1),lastDate=new Date(y,m,0).getDate(),firstDow=first.getDay();
  const mStr=`${y}-${String(m).padStart(2,'0')}`;
  const schEvs=DB.calEvents.filter(e=>e.cat===1&&(schFEmp===0||e.empId===schFEmp));
  const byDate={};
  schEvs.forEach(ev=>{
    let d=new Date(ev.dateStart),end=new Date(ev.dateEnd);
    while(d<=end){const ds=d.toISOString().split('T')[0];if(ds.startsWith(mStr)){if(!byDate[ds])byDate[ds]=[];byDate[ds].push(ev)}d.setDate(d.getDate()+1)}
  });
  const dow=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  let cells='';
  for(let i=0;i<firstDow;i++) cells+=`<div style="min-height:90px;border-right:1px solid var(--b1);border-bottom:1px solid var(--b1)"></div>`;
  for(let d=1;d<=lastDate;d++){
    const dt=new Date(y,m-1,d),dowI=dt.getDay();
    const ds=`${mStr}-${String(d).padStart(2,'0')}`;
    const isT=ds===TODAY,isSun=dowI===0,isSat=dowI===6,isHol=isHoliday(ds);
    const dayEvs=byDate[ds]||[];
    const badges=dayEvs.slice(0,4).map(ev=>{
      const emp=em[ev.empId];
      const wt=WORK_TYPES[ev.workType]||WORK_TYPES.production;
      return`<div onclick="event.stopPropagation();openEditEv(${ev.id})" style="display:flex;align-items:center;gap:2px;background:${wt.bg};border-left:2px solid ${wt.color};border-radius:2px;padding:1px 4px;margin-bottom:2px;cursor:pointer">
        <div style="width:5px;height:5px;border-radius:50%;background:${emp?.color||wt.color};flex-shrink:0"></div>
        <span style="font-size:9px;color:${wt.color};font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:44px">${emp?.name||'?'}</span>
        <span style="font-size:8px;color:var(--t3);margin-left:auto">${ev.startTime||wt.label.slice(0,2)}</span>
      </div>`;
    }).join('');
    const extra=dayEvs.length-4;
    cells+=`<div style="min-height:90px;border-right:1px solid var(--b1);border-bottom:1px solid var(--b1);padding:4px;cursor:pointer;${isT?'background:rgba(154,110,47,.06)':''}${isHol&&!isT?'background:rgba(181,50,50,.04)':''}" onclick="openDaySchedPanel('${ds}')">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;${isT?'background:var(--gold);color:#000':isSun||isHol?'color:var(--red)':isSat?'color:var(--blue)':'color:var(--t2)'}">${d}</div>
        ${isHol&&!isT?`<span style="font-size:7px;color:var(--red)">공휴</span>`:''}
      </div>
      ${badges}
      ${extra>0?`<div style="font-size:8px;color:var(--t3);padding:0 3px">+${extra}명</div>`:''}
      <div onclick="event.stopPropagation();openDaySchedAdd('${ds}')" style="font-size:9px;color:var(--t3);text-align:center;cursor:pointer;border-radius:2px;margin-top:1px" onmouseover="this.style.background='var(--b1)'" onmouseout="this.style.background=''">+</div>
    </div>`;
  }
  const fill=42-(firstDow+lastDate);
  for(let i=0;i<(fill<0?fill+7:fill<7?fill:0);i++) cells+=`<div style="min-height:90px;border-right:1px solid var(--b1);border-bottom:1px solid var(--b1)"></div>`;
  wrap.innerHTML=`<div style="background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden">
    <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--b1)">
      ${dow.map((d,i)=>`<div style="padding:6px 0;text-align:center;font-size:8px;font-weight:700;color:${i===0?'var(--red)':i===6?'var(--blue)':'var(--t3)'};letter-spacing:1.5px">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr)">${cells}</div>
  </div>`;
}

function onDsaWtChange(sel){
  const isOff=sel.value==='off'||LEAVE_TYPES.includes(sel.value);
  const tr=document.getElementById('dsa-time-row');if(tr)tr.style.display=isOff?'none':'block';
}

function submitDaySchedAdd(date){
  const empId=parseInt(document.getElementById('dsa-e')?.value);if(!empId){alert('직원 선택 필수');return}
  const wt=document.getElementById('dsa-wt')?.value||'production';
  const emp=DB.employees.find(e=>e.id===empId);
  const wtInfo=WORK_TYPES[wt]||WORK_TYPES.production;
  const isOff=wt==='off'||LEAVE_TYPES.includes(wt);
  const evs=DB.calEvents;
  evs.push({id:nid(),cat:1,
    title:`${emp?.name||'?'} ${wtInfo.label}`,
    dateStart:date,dateEnd:date,empId,
    startTime:isOff?'':document.getElementById('dsa-t')?.value||'07:00',
    workType:wt,
    note:document.getElementById('dsa-w')?.value||''
  });
  DB.calEvents=evs;
  if(wt==='annual')deductLeave(empId,'annual',1,date,'스케줄 자동차감');
  else if(wt==='halfAM'||wt==='halfPM')deductLeave(empId,'annual',0.5,date,'반차 자동차감');
  else if(wt==='altDay')deductLeave(empId,'altDay',1,date,'스케줄 자동차감');
  closeOv();renderSchedCal();
}

function bsCatCh(sel,empId,date){
  const wt=sel.value;
  const bg=wt==='off'?'var(--s3)':wt==='production'?'rgba(74,222,128,.08)':'rgba(96,165,250,.08)';
  const bc=wt==='off'?'var(--b1)':wt==='production'?'rgba(74,222,128,.3)':'rgba(96,165,250,.3)';
  const cl=wt==='off'?'var(--t3)':wt==='production'?'var(--green)':'var(--blue)';
  sel.style.background=bg;sel.style.borderColor=bc;sel.style.color=cl;
  const ti=document.querySelector(`input[data-type="time"][data-empid="${empId}"][data-date="${date}"]`);
  if(ti){ti.disabled=wt==='off';ti.style.opacity=wt==='off'?'0.4':'1';ti.style.cursor=wt==='off'?'not-allowed':'text';if(wt==='off')ti.value=''}
}

function submitBulkSched(){
  const catSels=document.querySelectorAll('select[data-type="cat"][data-empid][data-date]');
  let evs=DB.calEvents.filter(e=>e.cat!==1); // 기존 cat1 모두 제거 후 재구성
  // cat1이 아닌것만 남기고, 해당 월 cat1을 재등록
  const mStr=`${schedY}-${String(schedM).padStart(2,'0')}`;
  const keep=DB.calEvents.filter(e=>!(e.cat===1&&e.dateStart.startsWith(mStr)));
  const newEvs=[...keep];

  catSels.forEach(sel=>{
    const empId=parseInt(sel.dataset.empid);
    const date=sel.dataset.date;
    const wt=sel.value;
    const ti=document.querySelector(`input[data-type="time"][data-empid="${empId}"][data-date="${date}"]`);
    let startTime=ti?.value||'';
    if(startTime&&!startTime.includes(':')&&startTime.length>=4)startTime=startTime.slice(0,2)+':'+startTime.slice(2,4);
    const emp=DB.employees.find(e=>e.id===empId);
    newEvs.push({id:nid(),cat:1,title:`${emp?.name||'?'} ${wt==='off'?'휴무':'출근'}`,dateStart:date,dateEnd:date,empId,startTime:wt==='off'?'':startTime,workType:wt,note:''});
  });

  DB.calEvents=newEvs;
  closeOv();
  renderSchedule(document.getElementById('page-schedule'));
}

function empRoleRow(current,prefix){
  return EMP_ROLES.map(r=>`<button onclick="empRolePick('${r}','${prefix}',this)" id="${prefix}-rb-${r.replace(/\//,'_')}" style="flex:1;padding:6px 2px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid ${current===r?'var(--gold)':'var(--b1)'};background:${current===r?'var(--gold)':'var(--s3)'};color:${current===r?'#000':'var(--t2)'};transition:all .1s">${r}</button>`).join('');
}
function empPermCol(current,prefix){
  return Object.entries(PERM_KR).map(([k,v])=>`<button onclick="empPermPick('${k}','${prefix}',this)" id="${prefix}-pb-${k}" style="display:flex;align-items:center;justify-content:space-between;padding:8px 11px;border-radius:6px;cursor:pointer;font-family:inherit;border:1px solid ${current===k?'var(--gold)':'var(--b1)'};background:${current===k?'var(--golddim)':'var(--s2)'};transition:all .1s">
    <div><div style="font-size:11px;font-weight:600;color:${current===k?'var(--gold)':'var(--t1)'}">${v}</div><div style="font-size:9px;color:var(--t3)">${PERM_DESC[k]}</div></div>
    <div style="width:13px;height:13px;border-radius:50%;border:2px solid ${current===k?'var(--gold)':'var(--b2)'};background:${current===k?'var(--gold)':'transparent'}"></div>
  </button>`).join('');
}
function empRolePick(r,prefix){EMP_ROLES.forEach(ro=>{const b=document.getElementById(`${prefix}-rb-${ro.replace(/\//,'_')}`);if(b){b.style.background=ro===r?'var(--gold)':'var(--s3)';b.style.color=ro===r?'#000':'var(--t2)';b.style.borderColor=ro===r?'var(--gold)':'var(--b1)'}});const inp=document.getElementById(`${prefix}-role`);if(inp)inp.value=r}
function empPermPick(p,prefix){Object.keys(PERM_KR).forEach(k=>{const bt=document.getElementById(`${prefix}-pb-${k}`);if(bt){bt.style.borderColor=k===p?'var(--gold)':'var(--b1)';bt.style.background=k===p?'var(--golddim)':'var(--s2)';const t=bt.querySelector('div>div:first-child');if(t)t.style.color=k===p?'var(--gold)':'var(--t1)';const r=bt.querySelector('div:last-child');if(r){r.style.borderColor=k===p?'var(--gold)':'var(--b2)';r.style.background=k===p?'var(--gold)':'transparent'}}});const inp=document.getElementById(`${prefix}-perm`);if(inp)inp.value=p}
function empStatPick(s,prefix){const a=document.getElementById(`${prefix}-sa`),b=document.getElementById(`${prefix}-si`);if(a){a.style.background=s?'var(--gdim)':'var(--s2)';a.style.borderColor=s?'rgba(74,222,128,.3)':'var(--b1)';a.style.color=s?'var(--green)':'var(--t3)'}if(b){b.style.background=!s?'var(--s3)':'var(--s2)';b.style.borderColor=!s?'var(--b2)':'var(--b1)';b.style.color=!s?'var(--t2)':'var(--t3)'}const inp=document.getElementById(`${prefix}-active`);if(inp)inp.value=s?'true':'false'}

    <button onclick="confirmDelEmp(${id})" style="width:100%;padding:7px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;background:transparent;border:1px solid var(--b2);color:var(--t3);transition:all .1s" onmouseover="this.style.background='var(--rdim)';this.style.color='var(--red)'" onmouseout="this.style.background='transparent';this.style.color='var(--t3)'">이 직원 삭제</button>
  </div></div>`);
}
function submitManageEmp(id){
  const n=document.getElementById('mgr-name')?.value.trim();if(!n){alert('이름 필수');return}
  const emps=DB.employees;const i=emps.findIndex(e=>e.id===id);if(i<0)return;
  emps[i]={...emps[i],name:n,position:document.getElementById('mgr-pos')?.value||'',role:document.getElementById('mgr-role')?.value,permission:document.getElementById('mgr-perm')?.value,active:document.getElementById('mgr-active')?.value==='true',color:document.getElementById('mgr-color')?.value};
  DB.employees=emps;closeOv();renderEmployees(document.getElementById('page-employees'));
}
function confirmDelEmp(id){
  const emp=DB.employees.find(e=>e.id===id);if(!emp)return;
  const ex=document.getElementById('del-c');if(ex){ex.remove();return}
  const div=document.createElement('div');div.id='del-c';
  div.style.cssText='margin-top:10px;background:var(--rdim);border:1px solid rgba(248,113,113,.2);border-radius:6px;padding:11px';
  div.innerHTML=`<div style="font-size:11px;color:var(--red);font-weight:600;margin-bottom:5px">⚠ "${h(emp.name)}" 삭제 확인</div>
  <div style="font-size:9px;color:var(--t3);margin-bottom:9px">되돌릴 수 없습니다</div>
  <div style="display:flex;gap:6px"><button onclick="document.getElementById('del-c').remove()" style="flex:1;padding:5px;border-radius:4px;font-size:10px;background:var(--s3);border:1px solid var(--b1);color:var(--t2);cursor:pointer;font-family:inherit">취소</button>
  <button onclick="execDelEmp(${id})" style="flex:1;padding:5px;border-radius:4px;font-size:10px;font-weight:600;background:var(--red);border:none;color:#000;cursor:pointer;font-family:inherit">삭제</button></div>`;
  document.querySelector('.mb')?.appendChild(div);
}
function execDelEmp(id){DB.employees=DB.employees.filter(e=>e.id!==id);closeOv();renderEmployees(document.getElementById('page-employees'))}

function submitAddEmp(){
  const n=document.getElementById('new-name')?.value.trim();if(!n){alert('이름 필수');return}
  const emps=DB.employees;
  emps.push({id:nid(),name:n,position:document.getElementById('new-pos')?.value||'',role:document.getElementById('new-role')?.value,permission:document.getElementById('new-perm')?.value||'full',color:document.getElementById('new-color')?.value||'#4ade80',active:true});
  DB.employees=emps;closeOv();renderEmployees(document.getElementById('page-employees'));updateUserSel();
}

// ── SUPABASE 강제 동기화 ──
async function sbForceUpload(){
  if(!confirm('현재 기기의 모든 데이터를 Supabase에 업로드합니다.\n다른 팀원의 변경사항이 덮어써질 수 있습니다. 계속하시겠습니까?'))return;
  updateSyncBadge('loading');
  try{
    const c=_sbCache;
    // 배열 테이블: 전체 삭제 후 재삽입
    await sbReq('DELETE',SB_TBL.employees,null,'?id=gt.0');
    if((c.employees||[]).length) await sbSaveRows('employees',(c.employees||DEFS.employees).map(empToRow));
    await sbReq('DELETE',SB_TBL.items,null,'?id=gt.0');
    if((c.items||[]).length) await sbSaveRows('items',(c.items||DEFS.items).map(itemToRow));
    await sbReq('DELETE',SB_TBL.orders,null,'?id=gt.0');
    if((c.orders||[]).length) await sbSaveRows('orders',(c.orders||[]).map(orderToRow));
    await sbReq('DELETE',SB_TBL.prodEntries,null,'?id=gt.0');
    if((c.prodEntries||[]).length) await sbSaveRows('prodEntries',(c.prodEntries||[]).map(prodToRow));
    await sbReq('DELETE',SB_TBL.calEvents,null,'?id=gt.0');
    if((c.calEvents||[]).length) await sbSaveRows('calEvents',(c.calEvents||[]).map(eventToRow));
    await sbReq('DELETE',SB_TBL.leaveBalance,null,'?emp_id=gt.0');
    if((c.leaveBalance||[]).length) await sbSaveRows('leaveBalance',(c.leaveBalance||[]).map(lbToRow));
    await sbReq('DELETE',SB_TBL.leaveRecords,null,'?id=gt.0');
    if((c.leaveRecords||[]).length) await sbSaveRows('leaveRecords',(c.leaveRecords||[]).map(lrToRow));
    await sbReq('DELETE',SB_TBL.overtime,null,'?id=gt.0');
    if((c.overtimeRecords||[]).length) await sbSaveRows('overtime',(c.overtimeRecords||[]).map(otToRow));
    // settings
    const skeys=['categories','destinations','packagingTypes','shippingTypes','nextId','currentUserId','lastArchiveAlert','lastDataAlert','pendingDelete'];
    const srows=skeys.map(k=>({key:k,value:JSON.stringify(c[k]!==undefined?c[k]:DEFS[k]||null)}));
    await sbSaveRows('settings',srows);
    updateSyncBadge('ok');
    alert('✅ 서버 업로드 완료!');
  }catch(e){
    updateSyncBadge('offline');
    alert('⚠ 업로드 실패: '+e.message);
  }
}

async function sbForceDownload(){
  if(!confirm('서버의 최신 데이터를 현재 기기에 덮어씁니다.\n계속하시겠습니까?'))return;
  const ok=await sbLoadAll();
  if(ok){renderPage(curPage);updateUserSel();alert('✅ 서버 데이터 다운로드 완료!');}
  else{alert('⚠ 다운로드 실패. 연결을 확인해주세요.');}
}

// ── USER SEL ──
function updateUserSel(){
  const sel=document.getElementById('usel');if(!sel)return;
  const cur=DB.currentUserId;
  sel.innerHTML='<option value="">사용자 선택</option>'+DB.employees.filter(e=>e.active).map(e=>`<option value="${e.id}" ${e.id===cur?'selected':''}>${e.name}</option>`).join('');
}
function setUser(id){DB.currentUserId=parseInt(id)||0;updateUserSel()}

// ── INIT ──
(async function init(){
  const now=new Date();const ds=now.toISOString().split('T')[0];
  document.getElementById('sf-d').textContent=ds;
  document.getElementById('tb-d').textContent=ds;
  calY=now.getFullYear();calM=now.getMonth()+1;
  schedY=2026;schedM=4;
  dashY2=new Date().getFullYear();dashM2=new Date().getMonth()+1;
  shipCalY=calY;shipCalM=calM;

  updateSyncBadge('loading');

  // 1. Supabase에서 전체 데이터 로드
  const ok=await sbLoadAll();

  if(ok){
    // 2. 테이블이 비어있으면 기본값 초기화
    const isEmpty=!_sbCache.employees||_sbCache.employees.length===0;
    if(isEmpty){
      console.log('첫 실행 — 기본 데이터 Supabase에 저장 중...');
      // employees
      await sbReq('DELETE',SB_TBL.employees,null,'?id=gt.0');
      await sbSaveRows('employees',DEFS.employees.map(empToRow));
      // items
      await sbReq('DELETE',SB_TBL.items,null,'?id=gt.0');
      await sbSaveRows('items',DEFS.items.map(itemToRow));
      // orders
      await sbReq('DELETE',SB_TBL.orders,null,'?id=gt.0');
      await sbSaveRows('orders',DEFS.orders.map(orderToRow));
      // calEvents
      await sbReq('DELETE',SB_TBL.calEvents,null,'?id=gt.0');
      await sbSaveRows('calEvents',DEFS.calEvents.map(eventToRow));
      // leaveBalance
      await sbReq('DELETE',SB_TBL.leaveBalance,null,'?emp_id=gt.0');
      await sbSaveRows('leaveBalance',DEFS.leaveBalance.map(lbToRow));
      // settings
      const settingsInit=[
        {key:'categories',value:JSON.stringify(DEFS.categories)},
        {key:'destinations',value:JSON.stringify(DEFS.destinations)},
        {key:'packagingTypes',value:JSON.stringify(DEFS.packagingTypes)},
        {key:'shippingTypes',value:JSON.stringify(DEFS.shippingTypes)},
        {key:'nextId',value:JSON.stringify(DEFS.nextId)},
        {key:'currentUserId',value:JSON.stringify(DEFS.currentUserId)},
        {key:'lastArchiveAlert',value:'""'},
        {key:'lastDataAlert',value:'""'},
        {key:'pendingDelete',value:'[]'},
      ];
      await sbSaveRows('settings',settingsInit);
      // 다시 로드
      await sbLoadAll();
      console.log('초기 데이터 저장 완료');
    }
    updateSyncBadge('ok');
  }else{
    // 오프라인 — localStorage 폴백
    updateSyncBadge('offline');
    // localStorage에서 캐시로 복원
    ['employees','items','orders','prodEntries','calEvents','leaveBalance',
     'leaveRecords','overtimeRecords','pendingDelete','categories','destinations',
     'packagingTypes','shippingTypes','nextId','currentUserId'].forEach(k=>{
      const v=ld(k);if(v!==null)_sbCache[k]=v;
    });
  }

  updateUserSel();
  const startPage=document.querySelector('.page.on')?.id?.replace('page-','');
  renderPage(startPage||'dash');
})();
</script>
